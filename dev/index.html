  function updateEnemies(dt) {
    const player = G.player;
    for (const e of G.enemies) {
      if (e.dead || e.p.dead) continue;
      e.stT += dt;
      if (e.webT > 0) e.webT -= dt;
      if (e.stunT > 0) e.stunT -= dt;
      const baseY = e.p.y - kindH(e.kind);
      if (e.kind === "minion") {
        if (e.st === "bite") {
          if (e.stT > 0.35) {

        } else {
          e.off += e.dir * 46 * dt;
          const lim = e.p.w / 2 - 10;
          if (e.off > lim) {

          }
          if (e.off < -lim) {
            e.off = -lim;
            e.dir = 1;
          }
          e.cd -= dt;
          if (e.cd <= 0 && Math.abs(player.x - e.x) < 70 && Math.abs(player.y - e.y) < 50) {
            e.st = "bite";
            e.stT = 0;
            e.lungeDir = player.x > e.x ? 1 : -1;
          }
        }
        e.x = e.p.x + e.off + (e.st === "bite" ? e.lungeDir * 26 : 0);
        e.y = baseY - (e.st === "bite" ? 6 : 0);
      } else if (thuggish(e)) {
        if (e.st !== "lunge") e.dir = player.x > e.x ? 1 : -1;
        if (e.webT > 0) {
          e.st = "idle";
          e.off *= Math.exp(-8 * dt);
        } else if (e.st === "idle") {
          e.off *= Math.exp(-8 * dt);
          e.cd -= dt;
          if (e.cd <= 0 && Math.abs(player.y - e.y) < 240 && Math.abs(player.x - e.x) < 260) {
            e.st = "tele";
            e.stT = 0;
            e.lungeDir = e.dir;
          }
        } else if (e.st === "tele") {
          if (e.stT > 0.5) {
            e.st = "lunge";
            e.stT = 0;
            sfx.wing();
          }
        } else if (e.st === "lunge") {
          const T = 0.85;
          e.off = Math.sin(Math.PI * Math.min(1, e.stT / T)) * 150 * e.lungeDir;
          if (e.stT >= T) {
            e.st = "idle";
            e.stT = 0;
            e.off = 0;
            e.cd = 1.6 + Math.random() * 1.4;
          }
        }
        e.x = e.p.x + e.off + e.shoveX;
        e.y = baseY;
      } else if (e.kind === "cop") {

        e.y = baseY;

        "squash a cop — stomping only bounces + stuns.",
        "A Hawkeye arrow makes him dizzy for 3 s."
      ],
      demo(t) {
        const tt = t % 3;
        drawSpr("plat_normal", 300, 342);
        drawSpr(tt < 1.5 ? "cop_aim" : "cop_idle", 300, 308);
        if (tt < 1.5) {
          const bx = 330 + tt * 160 % 140;
          drawSpr("bullet", bx, 300, { shadow: false });
        } else {
          for (let i = 0; i < 3; i++) {
            const a = t * 4 + i * TAU / 3;
            txt("✦", 300 + Math.cos(a) * 18, 274 + Math.sin(a) * 5, 12, { color: "#d4a017", halo: false });
          }
          txt("DIZZY!", 300, 250, 15, { color: "#6b4b8a" });
        }
        drawSpr("spidey_fall", 430, 290, { s: 0.8 });
      }
    },
    {
      t: "CITIZEN",
      cap: [
        "Someone is waving HELP! on a rooftop.",
        "Touch them to rescue: +1 life",
        "(your lives cap at 3)."
      ],
      demo(t) {
        const tt = t % 2.4;
        drawSpr("plat_normal", 380, 342);
        drawSpr("citizen", 380, 308);
        txt("HELP!", 380, 258, 14, { color: "#c9302c", rot: -0.04 });
        const sx = Math.min(348, 230 + tt * 90);
        drawSpr("spidey_fall", sx, 300, { s: 0.9 });
        if (sx >= 346) {
          txt("+1 LIFE", 380, 230, 17, { color: "#4c7f1f" });
          drawSpr("pip", 380, 205, { shadow: false, s: 1.2 });
        }
      }
    },
    {
      t: "STORY MODE",
      cap: [
        "Beat a boss to free his region and unlock the",
        "next one on the US map. Each level: climb",
        "10,000, then the showdown. Endless = classic."
      ],
      demo(t) {
        drawSpr("usmap", 330, 280, { shadow: false, s: 0.52 });
        const mp = [[415, 264], [364, 262], [402, 325], [312, 278], [275, 288], [242, 276]];
        for (let i = 0; i < 6; i++) {
          const rng2 = mulberry32(120 + i);
          inkPath(ctx, rng2, ellipsePts(mp[i][0], mp[i][1], 12, 12, 0, 10), { fill: "#fffdf4", stroke: INK, lw: 1.6, jit: 0.5 });
          if (i === 0) drawSpr("face_sandman", mp[i][0], mp[i][1], { shadow: false, s: 0.55 });
          else if (i === 1) drawSpr("face_rhino", mp[i][0], mp[i][1], { shadow: false, s: 0.55 });
          else if (i === 2) drawSpr("face_lizard", mp[i][0], mp[i][1], { shadow: false, s: 0.55 });
          else txt("?", mp[i][0], mp[i][1] + 1, 11, { color: "#8a8578", halo: false });
        }
        const k = Math.floor(t / 1.2) % 3;
        ctx.save();
        ctx.strokeStyle = "#c9302c";
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5 + 0.4 * Math.sin(t * 5);
        ctx.beginPath();
        ctx.arc(mp[k][0], mp[k][1], 16, 0, TAU);
        ctx.stroke();
        ctx.restore();
        txt("STORY", 330, 180, 18, { color: "#c9302c" });
        txt("beat the boss → next region unlocks", 330, 420, 12.5, { color: "#8a8578" });
      }
    },
    {
      t: "BOSSES & LIVES",
      cap: [
        "Every 10,000: a boss arena. Stomp his HEAD ×3.",
        "Sandman roams · Rhino charges · Lizard leaps.",
        "3 lives for the run — falling is instant KO!"
      ],
      demo(t) {
        const tt = t % 2.2;
        drawSpr("sm_idle", 300, 300, { s: 0.75 });
        const ph = tt < 1.1 ? tt / 1.1 : (2.2 - tt) / 1.1;
        drawSpr("spidey_" + (tt < 1.1 ? "fall" : "bounce"), 300, 160 + ph * 78, { s: 0.8 });
        if (tt > 0.95 && tt < 1.5) txt("+250", 352, 226, 15, { color: "#c9302c" });
        txt("×3", 400, 180, 24, { color: "#c9302c" });
        for (let i = 0; i < 3; i++) drawSpr("pip", 268 + i * 26, 430, { shadow: false, s: 1.2 });
        txt("fall = KO!", 400, 430, 14, { color: "#8a8578" });
      }
    }
  ];
  function renderTutorial() {
    paper(W / 2, 46, 300, 52, -0.01, 71);
    txt("HOW TO PLAY", W / 2, 46, 26, { color: "#c9302c" });
    paper(36, 42, 44, 44, 0.02, 72);
    txt("←", 36, 42, 24);
    for (let i = 0; i < TOPICS.length; i++) {
      const y = TUT_Y0 + i * TUT_STEP;
      if (i === G.tutTopic) {
        ctx.save();
        ctx.globalAlpha = 0.14;
        ctx.fillStyle = "#c9302c";
        ctx.beginPath();
        const rng = mulberry32(80 + i);
        const pts = rrectPts(8, y - 16, TUT_LX - 16, 32, 6);
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (const pt of pts) ctx.lineTo(pt[0] + (rng() - 0.5) * 2, pt[1] + (rng() - 0.5) * 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      txt(TOPICS[i].t, 18, y, 13.5, { align: "left", color: i === G.tutTopic ? "#c9302c" : INK, halo: false });
      if (i === G.tutTopic) txt("▶", TUT_LX - 14, y, 12, { color: "#c9302c", halo: false });
    }
    paper(330, 300, 272, 396, 8e-3, 67);
    ctx.save();
    ctx.beginPath();
    ctx.rect(200, 108, 260, 384);
    ctx.clip();
    const topic = TOPICS[G.tutTopic] || TOPICS[0];
    topic.demo(G.t);
    ctx.restore();
    paper(W / 2, 620, 444, 118, -8e-3, 68);
    for (let i = 0; i < topic.cap.length; i++)
      txt(topic.cap[i], W / 2, 596 + i * 24, 14.5, { halo: false });
    txt(
      IS_TOUCH ? "tap a topic on the left · tap ← to go back" : "click the topics · ← / Esc to go back",
      W / 2,
      700,
      12,
      { color: "#8a8578" }
    );
  }

  // src/hooks.js
  globalThis.__T = {
    G,
    SPR,
    update,
    startGame,
    startEndless,
    startLevel,
    restartRun,
    debugJumpTo,
    tryWebShoot,
    tryGlideStart,
    bossHeadBox,
    findAnchor,
    togglePause,
    damage,
    addPlatform,
    spawnEnemy,
    useStored,
    get: () => ({
      state: G.state,
      boss: G.boss,
      globs: G.globs,
      platforms: G.platforms,
      player: G.player,
      webAmmo: G.webAmmo,
      glideAmmo: G.glideAmmo,
      zip: G.zip,
      gliding: G.gliding,
      nextBossAt: G.nextBossAt,
      bonus: G.bonus,
      cam: G.cam,
      score: score(),
      mouse: G.mouse,
      lives: G.lives,
      respawnInv: G.respawnInv,
      enemies: G.enemies,
      bullets: G.bullets,
      ironCarry: G.ironCarry,
      paused: G.paused
    }),
    setState: (s) => {
      G.state = s;
    },
    setNextBossAt: (v) => {
      G.nextBossAt = v;
    },
    setBossCount: (v) => {
      G.bossCount = v;
    },
    setAmmo: (w, g) => {
      G.webAmmo = w;
      G.glideAmmo = g;
    },
    setPlayer: (o) => Object.assign(G.player, o),
    setMouse: (o) => Object.assign(G.mouse, o),
    setBossHp: (v) => {
      if (G.boss) G.boss.hp = v;
    },
    setTilt: (v) => {
      G.tilt = v;
      G.tiltActive = true;
    },
    setInv: (v) => {
      G.respawnInv = v;
    },
    setLives: (v) => {
      G.lives = v;
    }
  };

  // src/main.js
  var FREEZE = parseFloat(Q.get("freeze") || "0");
  var last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, Math.max(0, (now - last) / 1e3));
    last = now;
    try {
      update(dt);
      render();
    } catch (err) {
      const d = document.getElementById("fatal");
      d.style.display = "block";
      d.textContent = "JS ERROR: " + err.message + "\n" + (err.stack || "");
      return;
    }
    if (FREEZE && G.t >= FREEZE) return;
    requestAnimationFrame(frame);
  }
  resetGame();
  G.state = "TITLE";
  if (Q.get("start") || Q.get("boss")) startGame();
  var dh = parseInt(Q.get("h") || "0", 10);
  if (dh > 0) {
    if (G.state === "TITLE") startGame();
    debugJumpTo(dh);
  }
  if (Q.get("tut") != null) {
    G.state = "TUTOR";
    G.tutTopic = parseInt(Q.get("tut"), 10) || 0;
  }
  var gk = Q.get("gear");
  if (gk === "cap" || gk === "sense" || gk === "hulk" || gk === "hawk") G.stored = gk;
  var ik = Q.get("item");
  if (ik && G.platforms[0]) G.platforms[0].item = { kind: ik, amt: ik === "web" || ik === "wing" ? 5 : 0 };
  if (Q.get("sense")) G.senseT = parseFloat(Q.get("sense")) || 3;
  if (Q.get("cleared") != null) G.storyCleared = parseInt(Q.get("cleared"), 10) || 0;
  if (Q.get("map")) G.state = "MAP";
  if (Q.get("level")) startLevel(parseInt(Q.get("level"), 10) || 1);
  requestAnimationFrame(frame);
})();

</script>
</body>
</html>
