  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}

<body>
<div id="wrap"><canvas id="game"></canvas></div>
<button id="tiltBtn">ENABLE TILT 開啟重力感應</button>
<div id="fatal"></div>
<script>
'use strict';
/* ================================================================
   SPIDEY JUMP — a hand-drawn doodle-jump homage (single file)
   Art: all drawn in code with jittered "ink" strokes + boiling-line
   animation (2 baked variants per sprite cycled at ~5fps).
   Controls: arrows/AD move · L-click web-zip · R-click hold glide
   ================================================================ */

// ---- fatal error overlay (so a runtime error is visible, incl. headless shots)
window.addEventListener('error', e => {
  const d = document.getElementById('fatal');
  d.style.display = 'block';
  d.textContent = 'JS ERROR: ' + e.message + '\n' + (e.filename||'') + ':' + e.lineno;
});

// ================= 1. CONSTANTS & UTILS =================
const W = 480, H = 720, TAU = Math.PI*2;
const INK = '#2a2620';
const FONT = '"Segoe Print","Comic Sans MS","Chalkboard SE",cursive';
const Q = new URLSearchParams(location.search);

function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function mulberry32(seed){
  return function(){
    seed|=0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed>>>15, 1|seed);
    t = t + Math.imul(t ^ t>>>7, 61|t) ^ t;
    return ((t ^ t>>>14)>>>0) / 4294967296;
  };
}
function hash(s){ let h=9; for(let i=0;i<s.length;i++) h=Math.imul(h^s.charCodeAt(i),387420489); return h^h>>>9; }

const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let RS = Math.min(2, window.devicePixelRatio||1);
cv.width = W*RS; cv.height = H*RS;
function fit(){
  const s = Math.min(innerWidth/W, innerHeight/H)*0.985;
  cv.style.width = (W*s)+'px'; cv.style.height = (H*s)+'px';
}
addEventListener('resize', fit); fit();

// ================= 2. AUDIO (tiny synth) =================
let AC=null, master=null, muted=false;
try{ muted = localStorage.getItem('sjMute')==='1'; }catch(e){}
function ensureAudio(){
  if(AC){
    // iOS Safari creates contexts suspended; resume inside the user gesture
    try{ if(AC.state==='suspended') AC.resume(); }catch(e){}
    return;
  }
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.22; master.connect(AC.destination);
    try{ if(AC.state==='suspended') AC.resume(); }catch(e){}
  }catch(e){}
}
function tone(f0,f1,d,type,v,delay){
  if(!AC||muted) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type||'triangle';
  o.frequency.setValueAtTime(f0,t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(20,f1), t0+d);
  g.gain.setValueAtTime(v||0.5, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+d);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+d+0.02);
}
function noise(d,v,fc){
  if(!AC||muted) return;
  const t0 = AC.currentTime;
  const n = AC.sampleRate*d, buf = AC.createBuffer(1,n,AC.sampleRate);
  const ch = buf.getChannelData(0);
  for(let i=0;i<n;i++) ch[i] = (Math.random()*2-1)*(1-i/n);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type='bandpass'; f.frequency.value=fc||1200; f.Q.value=0.8;
  const g = AC.createGain(); g.gain.value = v||0.4;
  src.connect(f); f.connect(g); g.connect(master); src.start(t0);
}
const sfx = {
  boing(){ tone(170+Math.random()*40, 560, 0.16, 'triangle', 0.5); },
  spring(){ tone(200, 980, 0.26, 'triangle', 0.6); tone(400,1200,0.2,'sine',0.25,0.03); },
  thwip(){ noise(0.08, 0.5, 2400); tone(900,1500,0.08,'sine',0.2); },
  zip(){ tone(380, 760, 0.12, 'sawtooth', 0.2); },
  fizz(){ noise(0.06,0.2,900); },
  crack(){ noise(0.12, 0.55, 500); tone(180,90,0.1,'square',0.2); },
  pickup(){ tone(660,660,0.07,'sine',0.4); tone(880,880,0.1,'sine',0.4,0.08); },
  wing(){ noise(0.12,0.3,700); },
  stomp(){ tone(160,55,0.16,'square',0.6); noise(0.08,0.4,300); },
  thud(){ tone(120,60,0.12,'square',0.4); },
  roar(){ tone(120,70,0.5,'sawtooth',0.5); tone(95,60,0.5,'sawtooth',0.4,0.05); },
  die(){ tone(320,50,0.7,'sawtooth',0.5); },
  win(){ [523,659,784,1046].forEach((f,i)=>tone(f,f,0.12,'triangle',0.5,i*0.09)); },
  charge(){ noise(0.3,0.4,400); tone(200,140,0.3,'sawtooth',0.3); },
};

// ================= 3. SKETCH (hand-drawn ink) HELPERS =================
function jitterPts(pts, jit, rng, closed){
  const res=[], n=pts.length, segs = closed? n : n-1;
  for(let i=0;i<segs;i++){
    const a=pts[i], b=pts[(i+1)%n];
    const d=Math.hypot(b[0]-a[0], b[1]-a[1]);
    const steps=Math.max(2, Math.round(d/7));
    for(let s=0;s<steps;s++){
      const t=s/steps;
      res.push([ a[0]+(b[0]-a[0])*t + (rng()-0.5)*jit*2,
                 a[1]+(b[1]-a[1])*t + (rng()-0.5)*jit*2 ]);
    }
  }
  if(!closed) res.push([pts[n-1][0], pts[n-1][1]]);
  return res;
}
function pathFrom(g, pts, closed){
  g.beginPath(); g.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<pts.length;i++) g.lineTo(pts[i][0], pts[i][1]);
  if(closed) g.closePath();
}
// filled+outlined wobbly shape — the core "marker pen" look
function inkPath(g, rng, pts, o){
  o=o||{};
  const closed = o.closed!==false;
  const jit = o.jit==null?1.3:o.jit;
  const j = jitterPts(pts, jit, rng, closed);
  pathFrom(g, j, closed);
  if(o.fill){ g.fillStyle=o.fill; g.fill(); }
  if(o.stroke!==null){
    g.strokeStyle = o.stroke||INK; g.lineWidth = o.lw||2.2; g.stroke();
    if(o.rough!==false){
      const j2 = jitterPts(pts, jit*1.5, rng, closed);
      pathFrom(g, j2, closed);
      g.globalAlpha *= 0.3; g.lineWidth = (o.lw||2.2)*0.6; g.stroke(); g.globalAlpha /= 0.3;
    }
  }
}
function inkLine(g, rng, x1,y1,x2,y2, o){
  inkPath(g, rng, [[x1,y1],[x2,y2]], Object.assign({closed:false, fill:null}, o));
}
function ellipsePts(cx,cy,rx,ry,rot,n){
  rot=rot||0; n=n||18; const p=[];
  const c=Math.cos(rot), s=Math.sin(rot);
  for(let i=0;i<n;i++){
    const a=i/n*TAU;
    let x=Math.cos(a)*rx, y=Math.sin(a)*ry;
    p.push([cx + x*c - y*s, cy + x*s + y*c]);
  }
  return p;
}
function blobPts(rng,cx,cy,r,irr,n){
  irr=irr==null?0.22:irr; n=n||12; const p=[];
  for(let i=0;i<n;i++){
    const a=i/n*TAU, rr=r*(1+(rng()-0.5)*2*irr);
    p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr]);
  }
  return p;
}
function rrectPts(x,y,w,h,r){
  return [[x+r,y],[x+w-r,y],[x+w,y+r],[x+w,y+h-r],[x+w-r,y+h],[x+r,y+h],[x,y+h-r],[x,y+r]];
}
// a limb = ink underlay + colour stroke on top (marker over pen)
function limb(g, rng, pts, color, w){
  inkPath(g, rng, pts, {closed:false, fill:null, stroke:INK, lw:w+2.6, jit:0.7, rough:false});
  inkPath(g, rng, pts, {closed:false, fill:null, stroke:color, lw:w, jit:0.7, rough:false});
}
// faint marker streaks inside a shape (fill texture)
function streaks(g, rng, cx, cy, w, h, color, n){
  g.save(); g.globalAlpha = 0.16; g.strokeStyle = color; g.lineWidth = 3;
  for(let i=0;i<(n||3);i++){
    const y = cy - h/2 + h*(0.25+0.5*rng());
    const x0 = cx - w*0.32 + rng()*10, x1 = cx + w*0.32 - rng()*10;
    g.beginPath(); g.moveTo(x0, y+(rng()-0.5)*3); g.lineTo(x1, y+(rng()-0.5)*3); g.stroke();
  }
  g.restore();
}

// ================= 4. SPRITE BAKERY =================
const SPR = {};
let boilFrame = 0;
function bake(key, w, h, fn, variants){
  variants = variants||2;
  const arr=[], sh=[];
  for(let v=0;v<variants;v++){
    const c=document.createElement('canvas');
    c.width=w*2; c.height=h*2;
    const g=c.getContext('2d');
    g.scale(2,2); g.lineJoin='round'; g.lineCap='round';
    fn(g, mulberry32(hash(key)+v*7919), v);
    arr.push(c);
    // pre-baked shadow silhouette (per-frame canvas filters are slow on phones)
    const sc=document.createElement('canvas');
    sc.width=w*2; sc.height=h*2;
    const sg=sc.getContext('2d');
    sg.drawImage(c,0,0);
    sg.globalCompositeOperation='source-in';
    sg.fillStyle='#000'; sg.fillRect(0,0,sc.width,sc.height);
    sh.push(sc);
  }
  SPR[key] = {c:arr, sh:sh, w:w, h:h};
}
function drawSpr(key, x, y, o){
  o=o||{};
  const s=SPR[key];
  const idx=((boilFrame % s.c.length)+s.c.length) % s.c.length;
  const img=s.c[idx];
  const sx=(o.sx||1)*(o.s||1), sy=(o.sy||1)*(o.s||1);
  ctx.save(); ctx.translate(x,y); ctx.rotate(o.rot||0); ctx.scale(sx,sy);
  if(o.shadow!==false){
    ctx.globalAlpha=(o.alpha==null?1:o.alpha)*0.12;
    ctx.drawImage(s.sh[idx], -s.w/2+3, -s.h/2+4, s.w, s.h);
  }
  ctx.globalAlpha = o.alpha==null?1:o.alpha;
  ctx.drawImage(img, -s.w/2, -s.h/2, s.w, s.h);
  ctx.restore(); ctx.globalAlpha=1;
}

// ---------- 4a. SPIDEY ----------
const RED='#e23c3a', REDD='#a8201f', BLUE='#3763c9', WEBRED='#7c1414';
function spideyHead(g, rng, cx, cy, sc){
  sc=sc||1;
  // head
  inkPath(g, rng, ellipsePts(cx,cy,13.5*sc,12.5*sc), {fill:RED, lw:2.4});
  // shading crescent
  g.save(); g.globalAlpha=0.18; g.fillStyle=REDD;
  g.beginPath(); g.ellipse(cx+5*sc, cy+3*sc, 8*sc, 9*sc, -0.4, 0, TAU); g.fill(); g.restore();
  // mask webbing — sparse doodle version
  g.save(); g.globalAlpha=0.75;
  for(let i=-2;i<=2;i++){
    inkLine(g, rng, cx+i*4.6*sc, cy-12*sc+Math.abs(i)*1.4*sc, cx+i*6.4*sc, cy+11*sc-Math.abs(i)*2.2*sc,
      {stroke:WEBRED, lw:0.9, jit:0.7, rough:false});
  }
  inkPath(g, rng, ellipsePts(cx,cy-3*sc,11.5*sc,5.5*sc,0,14), {fill:null, stroke:WEBRED, lw:0.9, jit:0.6, rough:false});
  inkPath(g, rng, ellipsePts(cx,cy+4*sc,10.5*sc,5*sc,0,14), {fill:null, stroke:WEBRED, lw:0.9, jit:0.6, rough:false});
  g.restore();
  // big white eyes
  inkPath(g, rng, ellipsePts(cx-6.4*sc, cy+0.6*sc, 5.4*sc, 3.8*sc, -0.42, 14), {fill:'#fdfdf6', lw:1.8, jit:0.5});
  inkPath(g, rng, ellipsePts(cx+6.4*sc, cy+0.6*sc, 5.4*sc, 3.8*sc, 0.42, 14), {fill:'#fdfdf6', lw:1.8, jit:0.5});
}
function spideyEmblem(g, rng, cx, cy){
  inkLine(g, rng, cx, cy-2.4, cx, cy+2.6, {lw:1.6, jit:0.3, rough:false});
  for(const s of [-1,1]){
    inkLine(g, rng, cx, cy-1, cx+3.4*s, cy-2.8, {lw:1, jit:0.3, rough:false});
    inkLine(g, rng, cx, cy,   cx+3.8*s, cy+0.4, {lw:1, jit:0.3, rough:false});
    inkLine(g, rng, cx, cy+1, cx+3.2*s, cy+3,   {lw:1, jit:0.3, rough:false});
  }
}
function spideyTorso(g, rng, stretch){
  const st = stretch||0;
  // torso (red) — slightly rounded trapezoid
  inkPath(g, rng, [[18,29-st],[34,29-st],[33,43],[19,43]], {fill:RED, lw:2.2});
  streaks(g, rng, 26, 36, 16, 12, REDD, 2);
  // chest web hints
  g.save(); g.globalAlpha=0.6;
  inkPath(g, rng, ellipsePts(26,31-st,7.5,3.4,0,12), {fill:null, stroke:WEBRED, lw:0.8, jit:0.5, rough:false});
  g.restore();
  spideyEmblem(g, rng, 26, 35);
  // blue hips
  inkPath(g, rng, [[19,43],[33,43],[32,50],[20,50]], {fill:BLUE, lw:2.2});
}
function drawSpidey(g, rng, pose){
  // 52 x 66 grid, feet ~ y=64, centre ~ (26,33)
  const glove = (x,y)=> inkPath(g, rng, blobPts(rng,x,y,3.4,0.18,8), {fill:RED, lw:1.8});
  const boot  = (x,y)=> inkPath(g, rng, ellipsePts(x,y,4.4,3,0,10), {fill:RED, lw:1.8});
  if(pose==='glide'){
    // web membranes behind arms
    for(const s of [-1,1]){
      const hx = 26+s*22, hy = 27;
      inkPath(g, rng, [[hx,hy],[26+s*4,44],[26+s*2,31]], {fill:'rgba(253,253,246,.95)', lw:1.6, jit:0.8});
      g.save(); g.globalAlpha=0.55;
      inkLine(g, rng, 26+s*6,33, hx-s*2, hy+1, {lw:0.8, jit:0.5, rough:false});
      inkLine(g, rng, 26+s*5,38, hx-s*6, hy+3, {lw:0.8, jit:0.5, rough:false});
      inkPath(g, rng, [[hx-s*3,hy+4],[26+s*8,40]], {closed:false, fill:null, lw:0.8, jit:0.5, rough:false});
      g.restore();
    }
  }
  // legs
  if(pose==='bounce'){
    limb(g, rng, [[22,47],[16,55],[18,62]], BLUE, 4.2); boot(18,63);
    limb(g, rng, [[30,47],[36,55],[34,62]], BLUE, 4.2); boot(34,63);
  }else if(pose==='fall'){
    limb(g, rng, [[22,47],[14,56],[12,63]], BLUE, 4.2); boot(11,64);
    limb(g, rng, [[30,47],[38,56],[40,63]], BLUE, 4.2); boot(41,64);
  }else if(pose==='glide'){
    limb(g, rng, [[24,47],[22,58],[23,64]], BLUE, 4.2); boot(23,65);
    limb(g, rng, [[28,47],[30,58],[29,64]], BLUE, 4.2); boot(29,65);
  }else{ // zip
    limb(g, rng, [[22,47],[16,57],[11,61]], BLUE, 4.2); boot(10,62);
    limb(g, rng, [[30,47],[27,59],[23,64]], BLUE, 4.2); boot(22,65);
  }
  // torso
  spideyTorso(g, rng, pose==='zip'?2:0);
  // arms
  if(pose==='bounce'){
    limb(g, rng, [[19,31],[10,36],[8,42]], RED, 3.8); glove(7,43);
    limb(g, rng, [[33,31],[40,23],[43,16]], RED, 3.8); glove(44,15);
    // thwip fingers
    inkLine(g, rng, 44,15, 48,11, {lw:1.2, jit:0.4, rough:false});
    inkLine(g, rng, 44,15, 48,17, {lw:1.2, jit:0.4, rough:false});
  }else if(pose==='fall'){
    limb(g, rng, [[19,31],[11,24],[7,16]], RED, 3.8); glove(6,15);
    limb(g, rng, [[33,31],[41,24],[45,16]], RED, 3.8); glove(46,15);
  }else if(pose==='glide'){
    limb(g, rng, [[19,30],[10,28],[4,27]], RED, 3.8); glove(3,27);
    limb(g, rng, [[33,30],[42,28],[48,27]], RED, 3.8); glove(49,27);
  }else{ // zip — both arms up
    limb(g, rng, [[20,30],[19,16],[21,5]], RED, 3.8); glove(21,4);
    limb(g, rng, [[32,30],[31,16],[31,5]], RED, 3.8); glove(31,4);
  }
  // head
  spideyHead(g, rng, 26, pose==='zip'?13:15, pose==='fall'?1.04:1);
}
['bounce','fall','glide','zip'].forEach(p=>
  bake('spidey_'+p, 52, 66, (g,rng)=>drawSpidey(g,rng,p)));

// ---------- 4b. PLATFORMS ----------
function platBase(g, rng, fill, edge){
  inkPath(g, rng, rrectPts(4,3,68,12,5), {fill:fill, stroke:edge, lw:2.4, jit:1.1});
  streaks(g, rng, 38, 9, 60, 8, edge, 2);
  // little top highlight
  g.save(); g.globalAlpha=0.5;
  inkLine(g, rng, 12, 5.5, 30+rng()*20, 5.5, {stroke:'#ffffff', lw:1.6, jit:0.5, rough:false});
  g.restore();
}
bake('plat_normal', 76, 18, (g,rng)=> platBase(g,rng,'#8fd14f','#4c7f1f'));
bake('plat_moving', 76, 18, (g,rng)=>{
  platBase(g,rng,'#63aef0','#265f9e');
  g.save(); g.globalAlpha=.75;
  inkLine(g,rng, 12,9, 6,9, {stroke:'#265f9e', lw:1.6, jit:.4, rough:false});
  inkLine(g,rng, 64,9, 70,9, {stroke:'#265f9e', lw:1.6, jit:.4, rough:false});
  g.restore();
});
bake('plat_crumble', 76, 18, (g,rng)=>{
  platBase(g,rng,'#d8a75e','#8a5a25');
  inkPath(g,rng,[[36,4],[40,8],[36,11],[41,14]],{closed:false,fill:null,stroke:'#6d431a',lw:1.4,jit:.5,rough:false});
  inkPath(g,rng,[[20,5],[23,9],[20,13]],{closed:false,fill:null,stroke:'#6d431a',lw:1.1,jit:.5,rough:false});
  inkPath(g,rng,[[56,5],[53,9],[56,13]],{closed:false,fill:null,stroke:'#6d431a',lw:1.1,jit:.5,rough:false});
});
bake('plat_rotten', 76, 20, (g,rng)=>{
  // warped, obviously-unsafe grey board with holes
  inkPath(g, rng, [[5,8],[20,4],[40,7],[58,3],[72,7],[70,15],[52,18],[30,15],[10,17]],
    {fill:'#9b948a', stroke:'#54504a', lw:2.2, jit:1.4});
  inkPath(g, rng, [[30,6],[38,10],[33,14]], {closed:false, fill:null, stroke:'#3d3a35', lw:1.6, jit:.6, rough:false});
  inkPath(g, rng, ellipsePts(18,11,3,2.2,0,8), {fill:'#54504a', lw:1, jit:.4});
  inkPath(g, rng, ellipsePts(56,11,2.6,2,0,8), {fill:'#54504a', lw:1, jit:.4});
});
bake('plat_halfL', 40, 18, (g,rng)=>{
  inkPath(g, rng, [[4,4],[34,3],[30,9],[35,15],[6,15]], {fill:'#d8a75e', stroke:'#8a5a25', lw:2.2, jit:1});
});
bake('plat_halfR', 40, 18, (g,rng)=>{
  inkPath(g, rng, [[6,3],[36,4],[34,15],[5,15],[10,9]], {fill:'#d8a75e', stroke:'#8a5a25', lw:2.2, jit:1});
});
// spring
bake('spring0', 26, 20, (g,rng)=>{
  inkPath(g,rng,[[5,18],[21,15],[5,13]],{closed:false,fill:null,stroke:'#5c6068',lw:2.4,jit:.5,rough:false});
  inkPath(g,rng,rrectPts(4,6,18,5,2),{fill:'#b9bdc4',stroke:'#5c6068',lw:2.2,jit:.7});

// ================= 5. WORLD STATE =================
let state='TITLE', paused=false;
let t=0, shake=0;
let cam={y:0};
let player, platforms, globs, parts, floats, clouds, boss;
let minY, bonus, best=0, nextBossAt, bossCount, hintT;
let webAmmo, glideAmmo, gliding, zip, zipCD, knockCD;
let bossLives=3, respawnInv=0;   // 3 chances per boss fight; respawn invincibility timer
let genY, lastSafeX, lastSafeCrumble, itemNextH, cloudNext=[0,0], webDoodadNext;
let stateT=0, bossKind='', deadT=0, newBest=false, milestone;
try{ best = parseInt(localStorage.getItem('sjBest')||'0',10)||0; }catch(e){}

const GRAV=2200, BOUNCE=-820, SPRINGV=-1350, MAXVX=380, ACCEL=2500;
const ZIP_RANGE=340, ZIP_SPEED=1300, GLIDE_CAP=135;

function heightClimbed(){ return Math.max(0, -minY); }
function score(){ return Math.floor(heightClimbed()) + bonus; }

// ================= 6. PLATFORM GENERATION =================
function diffT(h){ return clamp(h/26000, 0, 1); }
function addPlatform(x, y, type, o){
  const p = Object.assign({
    x:x, y:y, w:76, h:14, type:type, vx:0, dead:false,
    rot:(Math.random()-0.5)*0.05, spring:false, sprT:0, item:null, arena:false
  }, o||{});
  if(type==='moving'){
    p.vx = (50 + 115*diffT(heightClimbed()||-genY)) * (Math.random()<0.5?-1:1);
  }
  platforms.push(p);
  return p;
}
function genUpTo(limit){
  const R = Math.random;
  while(genY > limit){
    const h = Math.max(0, -genY);
    const dt_ = diffT(h);
    const early = h < 700;
    const gap = early ? 50+R()*18 : lerp(48+R()*34, 86+R()*36, dt_);
    genY -= gap;
    // --- guaranteed-safe platform (the chain you can always climb)
    let x = lastSafeX + (R()-0.5)*2*lerp(120, 210, dt_);
    if(x<50||x>W-50) x = clamp(W-lastSafeX+(R()-0.5)*80, 45, W-45);
    let type='normal';
    if(!early){
      const r=R();
      if(r < 0.06+0.30*dt_) type='moving';
      else if(r < 0.06+0.30*dt_ + (lastSafeCrumble?0:0.04+0.16*dt_)) type='crumble';
    }
    lastSafeCrumble = (type==='crumble');
    const p = addPlatform(x, genY, type);
    lastSafeX = x;
    // spring
    if(type==='normal' && R()<0.08) p.spring=true;
    // item pickups ride safe platforms
    if(h > itemNextH && type!=='crumble' && !p.spring){
      const kind = R()<0.5?'web':'wing';
      const amt = R()<0.68?5:10;
      p.item = {kind:kind, amt:amt};
      itemNextH = h + 850 + R()*650;
    }
    // --- optional extra platform in the band (may be junk)
    if(!early && R() < 0.5-0.2*dt_){
      let ex = R()*(W-90)+45;
      if(Math.abs(ex-x)>90){
        const r2=R();
        let et = 'normal';
        if(r2 < 0.28+0.3*dt_) et='rotten';
        else if(r2 < 0.5+0.3*dt_) et='crumble';
        else if(r2 < 0.62) et='moving';
        addPlatform(ex, genY - gap*0.45, et);
      }
    }
    // scenery
    if(genY < webDoodadNext){
      clouds.push({key:'webcorner', x: Math.random()<0.5? 55:W-55, py:genY, p:1,
                   alpha:0.10, sx: Math.random()<0.5?1:-1});
      webDoodadNext = genY - 2400 - R()*1500;
    }
  }
}
function spawnClouds(){
  for(let L=0; L<2; L++){
    const par = L===0?0.35:0.6;
    while(cam.y*par < cloudNext[L]){
      clouds.push({key: L===0?'cloud0':'cloud1', x: 40+Math.random()*(W-80),
                   py: cam.y*par - 90, p:par, alpha: L===0?0.55:0.8, sx:1});
      cloudNext[L] -= 260 + Math.random()*320;
    }
  }
  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];
    if(c.py - cam.y*c.p > H+120) clouds.splice(i,1);
  }
}

// ================= 7. GAME FLOW =================
function resetGame(){
  player = {x:W/2, y:0, vx:0, vy:0, r:15, face:1, pose:'fall', squash:0, spin:0};
  platforms=[]; globs=[]; parts=[]; floats=[]; clouds=[]; boss=null;
  minY=0; bonus=0; newBest=false; milestone=5000;
  nextBossAt = 10000; bossCount = 0;
  webAmmo=2; glideAmmo=2; gliding=false; zip=null; zipCD=0; knockCD=0;
  bossLives=3; respawnInv=0; touchState=null;
  cam.y = -(H-160); // player appears near the bottom
  genY = 46; lastSafeX = W/2; lastSafeCrumble=false;
  itemNextH = 500; cloudNext=[cam.y*0.35, cam.y*0.6]; webDoodadNext = -1800;
  hintT = 6;
  addPlatform(W/2, 46, 'normal');           // starter pad right under spidey
  genUpTo(cam.y - 300);
  // debug hooks
  if(Q.get('boss')){
    nextBossAt = 0;
    bossCount = parseInt(Q.get('boss'),10)-1;
    webAmmo=8; glideAmmo=8;
  }
}
function startGame(){ resetGame(); state='PLAY'; stateT=0; }

function loseLife(){
  bossLives--;
  sfx.thud(); sfx.fizz(); shake=9;
  floats.push({x:player.x, y:player.y-46, text:'-1 LIFE', life:1.4, size:22, color:'#c9302c'});
  // respawn: tossed back up over the arena, briefly invincible
  player.x=W/2; player.y=cam.y+520; player.vx=0; player.vy=-500;
  player.pose='fall';
  gliding=false; zip=null; touchState=null; globs=[];
  respawnInv=2.0; knockCD=0.8;
  if(boss && (boss.st==='charge'||boss.st==='tele'||boss.st==='windup'||boss.st==='throw')){
    boss.st='hover'; boss.stT=0; boss.pose='idle';
    boss.atkCD=2.2; boss.vx=0;
  }
}
function die(){
  if(state==='DEAD') return;
  // boss fights grant 3 lives (spidey-mask pips under the score)
  if((state==='BOSS'||state==='BOSSINTRO') && bossLives>1){ loseLife(); return; }
  state='DEAD'; stateT=0; deadT=0;
  sfx.die(); shake=10;
  gliding=false; zip=null; touchState=null;
  const s=score();
  if(s>best){ best=s; newBest=true; try{ localStorage.setItem('sjBest',''+best); }catch(e){} }
}

function triggerBoss(){
  state='BOSSINTRO'; stateT=0;
  bossLives=3; respawnInv=0;
  bossKind = (bossCount%2===0)?'sandman':'rhino';
  const loop = Math.floor(bossCount/2);
  // strip visible platforms, build the arena
  for(const p of platforms) if(p.y < cam.y+H+60) p.dead=true;
  platforms = platforms.filter(p=>!p.dead);
  const lay = [[110,640],[370,640],[240,545],[80,450],[400,450],[240,355]];
  for(const [x,y] of lay) addPlatform(x, cam.y+y, 'normal', {arena:true, rot:(Math.random()-.5)*0.04});
  addPlatform(clamp(player.x,50,W-50), cam.y+688, 'normal', {arena:true});
  boss = {
    kind:bossKind, hp:5, loop:loop, x:W/2, y:cam.y-80, t:0,
    st:'enter', stT:0, pose:'idle', dir:1, inv:0,
    atkCD: 2.2, targetY:0, vx:0
  };
  sfx.roar();
}
function winBoss(){
  state='BOSSWIN'; stateT=0;
  bonus += 1500;
  webAmmo = Math.min(12, webAmmo+5);
  glideAmmo = Math.min(12, glideAmmo+5);
  floats.push({x:W/2, y:cam.y+240, text:'+1500', life:2, size:30, color:'#c9302c'});
  floats.push({x:W/2, y:cam.y+280, text:'ammo +5/+5', life:2, size:18, color:INK});
  for(let i=0;i<44;i++){
    const a=Math.random()*TAU, sp=60+Math.random()*260;
    parts.push({x:boss.x, y:boss.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-100,
      life:0.6+Math.random()*0.8, type: boss.kind==='sandman'?'sand':'shard',
      size:2+Math.random()*4, rot:Math.random()*TAU, vr:(Math.random()-.5)*8,
      color: boss.kind==='sandman'?SAND:RHG });
  }
  boss=null; globs=[];
  nextBossAt = score() + 10000;
  bossCount++;
  sfx.win();
}

// ================= 8. INPUT =================
const keys={l:false,r:false};
const mouse={x:W/2,y:H/2};

// ---- mobile: tilt steering + touch gestures ----
const IS_TOUCH = Q.get('touch')==='1' ||
  (typeof matchMedia==='function' && matchMedia('(pointer:coarse)').matches) ||
  ('ontouchstart' in window);
let tilt=0, tiltActive=false, tiltGranted=false;
function onOrient(e){
  // map the correct axis for the current screen rotation
  const ang = (screen.orientation && screen.orientation.angle!=null)
    ? screen.orientation.angle : (window.orientation||0);
  let g;
  if(ang===90) g=e.beta;
  else if(ang===270||ang===-90) g=(e.beta==null?null:-e.beta);
  else if(ang===180) g=(e.gamma==null?null:-e.gamma);
  else g=e.gamma;
  if(g==null) return;
  tiltActive=true;
  const dead=3; // degrees of dead zone so a resting hand = stand still
  tilt = Math.abs(g)<dead ? 0 : clamp((g-Math.sign(g)*dead)/20, -1, 1);
}
function enableTilt(){
  try{
    if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
      DeviceOrientationEvent.requestPermission().then(res=>{
        if(res==='granted'){ tiltGranted=true; addEventListener('deviceorientation', onOrient); }
      }).catch(()=>{});
    }else{
      tiltGranted=true;
      addEventListener('deviceorientation', onOrient);
    }
  }catch(err){}
}
const needsTiltPermission = IS_TOUCH && typeof DeviceOrientationEvent!=='undefined' &&
  !!DeviceOrientationEvent.requestPermission;
if(!needsTiltPermission) enableTilt();   // Android / desktop: listen immediately (no-op without sensor)
document.getElementById('tiltBtn').addEventListener('click', ()=>{ ensureAudio(); enableTilt(); });

// touch gestures: tap = web · hold(>=0.22s) = glide · 2nd finger tap = web while gliding
let touchState=null;                      // {id, t0, glided}
const btnTouches=new Map();               // fallback ◀ ▶ buttons (no sensor)
function touchPos(t){
  const r=cv.getBoundingClientRect();
  return [(t.clientX-r.left)/r.width*W, (t.clientY-r.top)/r.height*H];
}
function fallbackBtns(){ return IS_TOUCH && !tiltActive; }
function inCircle(x,y,cx,cy,r){ return (x-cx)*(x-cx)+(y-cy)*(y-cy) < r*r; }
cv.addEventListener('touchstart', e=>{
  e.preventDefault(); ensureAudio();
  if(state==='TITLE'){ startGame(); return; }
  if(state==='DEAD'){ if(deadT>0.6) startGame(); return; }
  if(paused) return;
  for(const t of e.changedTouches){
    const [x,y]=touchPos(t);
    if(fallbackBtns() && inCircle(x,y,54,H-64,50)){ btnTouches.set(t.identifier,'L'); keys.l=true; continue; }
    if(fallbackBtns() && inCircle(x,y,W-54,H-64,50)){ btnTouches.set(t.identifier,'R'); keys.r=true; continue; }
    if(!touchState) touchState={id:t.identifier, t0:performance.now(), glided:false};
    else tryWebShoot();
  }
},{passive:false});
cv.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
function onTouchEnd(e){
  for(const t of e.changedTouches){
    const b=btnTouches.get(t.identifier);
    if(b!==undefined){
      btnTouches.delete(t.identifier);
      if(b==='L') keys.l=false; else keys.r=false;
      continue;
    }
    if(touchState && touchState.id===t.identifier){
      const dur=performance.now()-touchState.t0;
      if(!touchState.glided && dur<220 &&
         (state==='PLAY'||state==='BOSS'||state==='BOSSWIN')) tryWebShoot();
      gliding=false; touchState=null;
    }
  }
}
cv.addEventListener('touchend', onTouchEnd);
cv.addEventListener('touchcancel', onTouchEnd);
addEventListener('keydown', e=>{
  if(e.repeat) return;
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.l=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.r=true;
  if(e.code==='Space'){
    ensureAudio();
    if(state==='TITLE') startGame();
    else if(state==='DEAD' && deadT>0.6) startGame();
    e.preventDefault();
  }
  if(e.code==='KeyP' && (state==='PLAY'||state==='BOSS'||state==='BOSSINTRO'||state==='BOSSWIN')) paused=!paused;
  if(e.code==='KeyM'){ muted=!muted; try{ localStorage.setItem('sjMute',muted?'1':'0'); }catch(err){} }
});
addEventListener('keyup', e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.l=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.r=false;
});
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('mousemove', e=>{
  const r=cv.getBoundingClientRect();
  mouse.x = (e.clientX-r.left)/r.width*W;
  mouse.y = (e.clientY-r.top)/r.height*H;
});
cv.addEventListener('mousedown', e=>{
  ensureAudio();
  if(e.button===0){
    if(state==='TITLE') startGame();
    else if(state==='DEAD'){ if(deadT>0.6) startGame(); }
    else if((state==='PLAY'||state==='BOSS'||state==='BOSSWIN') && !paused) tryWebShoot();
  }else if(e.button===2){
    if((state==='PLAY'||state==='BOSS'||state==='BOSSWIN'||state==='BOSSINTRO') && !paused) tryGlideStart();
  }
});
addEventListener('mouseup', e=>{ if(e.button===2) gliding=false; });
addEventListener('blur', ()=>{ if(state==='PLAY'||state==='BOSS') paused=true; });

// ================= 9. PLAYER ABILITIES =================
function findAnchor(){
  // the web only fires STRAIGHT UP: latch onto the nearest platform
  // whose underside is directly above the player
  let bestA=null, bestD=1e9;
  for(const p of platforms){
    if(p.type==='rotten') continue;
    const uy = p.y + p.h/2 + 3;           // underside
    if(uy >= player.y - 12) continue;      // must be above
    const d = player.y - uy;
    if(d > ZIP_RANGE) continue;
    if(Math.abs(player.x - p.x) > p.w/2 + 8) continue;
    if(d < bestD){
      bestD=d;
      bestA={p:p, ox: clamp(player.x, p.x-p.w/2+6, p.x+p.w/2-6)-p.x, y:uy, d:d};
    }
  }
  return bestA;
}
function tryWebShoot(){
  if(zipCD>0 || zip) return;
  if(webAmmo<=0){ sfx.fizz(); flashAmmo=0.5; return; }
  const a=findAnchor();
  if(!a){
    sfx.fizz(); zipCD=0.25;
    parts.push({x:player.x+8*player.face, y:player.y-24, vx:player.face*40, vy:-120,
      life:0.25, type:'puff', size:4, rot:0, vr:0, color:'#c9c4b4'});
    return;
  }
  webAmmo--; zip={a:a, t:0}; zipCD=0.3; gliding=false;
  sfx.thwip();
}
function tryGlideStart(){
  if(gliding) return;
  if(glideAmmo<=0){ sfx.fizz(); flashAmmo2=0.5; return; }
  if(player.vy < -260) return;    // pointless right after a bounce
  glideAmmo--; gliding=true; sfx.wing();
}
let flashAmmo=0, flashAmmo2=0;

// ================= 10. BOSS BRAINS =================
function bossHeadBox(){
  if(!boss) return null;
  if(boss.kind==='sandman')
    return {cx:boss.x, top:boss.y-44, halfW:19, bottom:boss.y-14};
  return {cx:boss.x+22*boss.dir, top:boss.y-38, halfW:24, bottom:boss.y-12};
}
function updateBoss(dt){
  const b=boss; if(!b) return;
  b.t+=dt; b.stT+=dt; if(b.inv>0) b.inv-=dt;
  const camTop=cam.y;
  const spd = 1+0.14*b.loop;
  if(b.st==='enter'){
    b.y = lerp(b.y, camTop+235, Math.min(1,3*dt));
    if(state==='BOSS' && b.stT>0.8){ b.st='hover'; b.stT=0; }
    b.pose='idle';
    return;
  }
  if(b.kind==='sandman'){
    if(b.st==='hover'){
      b.x = W/2 + Math.sin(b.t*0.55)*150;
      b.y = camTop+238 + Math.sin(b.t*1.35)*16;
      b.dir = player.x>b.x?1:-1;
      b.atkCD -= dt*spd;
      b.pose='idle';
      if(b.atkCD<=0){ b.st='windup'; b.stT=0; }
    }else if(b.st==='windup'){
      b.pose='windup';
      b.y = camTop+238 + Math.sin(b.t*1.35)*16;
      if(b.stT>0.55){
        b.st='throw'; b.stT=0; b.pose='throw';
        const n = b.loop>0?4:3;
        for(let i=0;i<n;i++){
          const px=player.x, py=player.y;
          const gx=b.x+30*b.dir, gy=b.y-20;
          const dx=px-gx, dy=py-gy, len=Math.hypot(dx,dy)||1;
          const spread = (i-(n-1)/2)*0.16;
          const ca=Math.cos(spread), sa=Math.sin(spread);
          const nx=(dx*ca-dy*sa)/len, ny=(dx*sa+dy*ca)/len;
          const v = 300+35*b.loop;
          globs.push({x:gx,y:gy,vx:nx*v,vy:ny*v,r:9});
        }
        noise(0.15,0.5,600);
      }
    }else if(b.st==='throw'){
      b.pose='throw';
      if(b.stT>0.35){ b.st='hover'; b.stT=0; b.atkCD = Math.max(1.3, 2.5-0.2*b.loop); }
    }
  }else{ // RHINO
    if(b.st==='hover'){
      b.pose='idle';
      const tx = player.x<W/2 ? W-90 : 90;   // drift opposite the player
      b.x = lerp(b.x, tx, Math.min(1,1.4*dt));
      b.y = lerp(b.y, camTop+225, Math.min(1,2*dt)) + Math.sin(b.t*1.6)*6;
      b.dir = player.x>b.x?1:-1;
      b.atkCD -= dt*spd;
      if(b.atkCD<=0){
        b.st='tele'; b.stT=0;
        // +40 puts the horn (which sits at y-40) level with the player
        b.targetY = clamp(player.y + 40, camTop+150, camTop+590);
        sfx.charge();
      }
    }else if(b.st==='tele'){
      b.pose='tele';
      b.dir = player.x>b.x?1:-1;
      b.y = lerp(b.y, b.targetY, Math.min(1,5*dt));
      b.x += -b.dir*22*dt;                   // rear back
      shake = Math.max(shake, 1.2);
      if(b.stT>0.8){ b.st='charge'; b.stT=0; b.vx = b.dir*(720+50*b.loop); sfx.roar(); }
    }else if(b.st==='charge'){
      b.pose='charge';
      b.x += b.vx*dt;
      shake = Math.max(shake, 2);
      if((b.dir>0 && b.x>W+40)||(b.dir<0 && b.x<-40)){
        b.x = clamp(b.x,-40,W+40);
        b.st='dizzy'; b.stT=0;
      }
    }else if(b.st==='dizzy'){
      b.pose='dizzy';
      b.y += Math.sin(b.t*7)*8*dt;
      if(b.stT>1.7){ b.st='hover'; b.stT=0; b.atkCD = Math.max(1.6, 3-0.25*b.loop); }
    }
  }
}
function bossCollide(){
  const b=boss; if(!b || b.st==='enter') return;
  // 1) charging horn — checked before the stomp: touching the horn is always fatal
  if(b.kind==='rhino' && b.st==='charge' && respawnInv<=0){
    const hx=b.x+31*b.dir, hy=b.y-40;
    if(Math.abs(player.x-hx)<14+player.r*0.7 && Math.abs(player.y-hy)<15+player.r*0.7){ die(); return; }
  }
  // 2) stomp?
  const hb=bossHeadBox();
  const feet = player.y+26;
  if(player.vy>0 && Math.abs(player.x-hb.cx)<hb.halfW+10 &&
     feet>hb.top-8 && feet<hb.bottom+12 && player.y<hb.top){
    player.vy = -880; player.squash=0.25;
    if(b.inv<=0){
      b.hp--; b.inv=0.8; bonus+=250; shake=6;
      floats.push({x:b.x, y:hb.top-20, text:'+250', life:1, size:20, color:'#c9302c'});
      sfx.stomp();
      if(b.kind==='rhino' && b.st==='charge'){ b.st='dizzy'; b.stT=0; }
      if(b.hp<=0){ winBoss(); return; }
    }else sfx.thud();
    return;
  }
  // 3) body knockback (harmless)
  const bx = b.x;
  const by = b.y+ (b.kind==='rhino'? 12 : 6);
  const br = b.kind==='rhino'? 35 : 34;
  const dx=player.x-bx, dy=player.y-by, d=Math.hypot(dx,dy);
  if(d < br+player.r && knockCD<=0 && respawnInv<=0){
    const nx=dx/(d||1), ny=dy/(d||1);
    player.vx = nx*430; player.vy = Math.min(-330, ny*300);
    knockCD=0.55; sfx.thud(); shake=Math.max(shake,3);
  }
}

// ================= 11. UPDATE =================
function update(dt){
  t+=dt;
  boilFrame = Math.floor(t*5);
  if(shake>0) shake=Math.max(0,shake-14*dt);
  if(zipCD>0) zipCD-=dt;
  if(knockCD>0) knockCD-=dt;
  if(flashAmmo>0) flashAmmo-=dt;
  if(flashAmmo2>0) flashAmmo2-=dt;
  if(hintT>0) hintT-=dt;
  if(respawnInv>0) respawnInv-=dt;
  stateT+=dt;
  // touch: a held finger becomes a glide after 0.22s (a shorter touch was a web tap)
  if(touchState && !touchState.glided && !paused &&
     (state==='PLAY'||state==='BOSS'||state==='BOSSWIN') &&
     performance.now()-touchState.t0 >= 220){
    touchState.glided=true;
    tryGlideStart();
  }

  // particles & floaters always tick
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=900*dt; p.rot+=(p.vr||0)*dt;
    if(p.life<=0) parts.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.life-=dt; f.y-=34*dt;
    if(f.life<=0) floats.splice(i,1);
  }

  if(state==='TITLE'||state==='DEAD'){
    if(state==='DEAD'){
      deadT+=dt;
      player.spin += 9*dt;
      player.vy += GRAV*dt*0.6;
      player.y += player.vy*dt;
    }
    return;
  }
  if(paused) return;

  // ----- player physics -----
  const prevY = player.y;
  let ax=0, steering=false;
  if(keys.l){ ax-=ACCEL; player.face=-1; steering=true; }
  if(keys.r){ ax+=ACCEL; player.face=1; steering=true; }
  if(!steering && tiltActive && Math.abs(tilt)>0.02){
    ax += ACCEL*tilt;
    player.face = tilt<0 ? -1 : 1;
    steering=true;
  }
  if(zip){
    // web zip: reel toward anchor
    zip.t+=dt;
    const axp = zip.a.p.x + zip.a.ox, ayp = zip.a.y;
    const dx=axp-player.x, dy=ayp-player.y, d=Math.hypot(dx,dy);
    if(d<26 || zip.t>0.7 || zip.a.p.dead){
      player.vy=-720; player.vx=(dx/(d||1))*220;
      zip=null; sfx.zip();
    }else{
      player.x += dx/d*ZIP_SPEED*dt;
      player.y += dy/d*ZIP_SPEED*dt;
      player.vy = 0; player.vx = 0;
    }
  }else{
    player.vx += ax*dt;
    if(!steering) player.vx *= Math.exp(-6*dt);
    player.vx = clamp(player.vx, -MAXVX, MAXVX);
    player.vy += GRAV*dt;
    if(gliding && glideAmmo>=0 && player.vy>GLIDE_CAP){
      player.vy = GLIDE_CAP;
      if(Math.random()<dt*22)
        parts.push({x:player.x+(Math.random()-0.5)*36, y:player.y-30, vx:0, vy:-60,
          life:0.3, type:'wind', size:8+Math.random()*8, rot:0, vr:0, color:'#b8c4d6'});
    }
    player.x += player.vx*dt;
    player.y += player.vy*dt;
  }
  // wrap
  if(player.x < -18) player.x = W+18;
  if(player.x > W+18) player.x = -18;
  if(player.squash>0) player.squash-=dt;

  // pose
  if(zip) player.pose='zip';
  else if(gliding && player.vy>-40) player.pose='glide';
  else if(player.vy<0) player.pose='bounce';
  else player.pose='fall';

  // ----- platforms -----
  for(const p of platforms){
    if(p.type==='moving'){
      p.x += p.vx*dt;
      if(p.x<48){ p.x=48; p.vx*=-1; }
      if(p.x>W-48){ p.x=W-48; p.vx*=-1; }
    }
    if(p.sprT>0) p.sprT-=dt;
    // landing check (only when falling)
    if(!zip && player.vy>0 && !p.dead){
      const feetPrev = prevY+26, feetNow = player.y+26;
      if(feetPrev <= p.y+2 && feetNow >= p.y && Math.abs(player.x-p.x) < p.w/2+4){
        if(p.type==='rotten'){
          p.dead=true; sfx.crack();
          for(let i=0;i<7;i++)
            parts.push({x:p.x+(Math.random()-.5)*60, y:p.y, vx:(Math.random()-.5)*160,
              vy:-40+Math.random()*100, life:0.5+Math.random()*0.3, type:'shard',
              size:3+Math.random()*3, rot:Math.random()*TAU, vr:(Math.random()-.5)*10, color:'#9b948a'});
        }else{
          player.y = p.y-26;
          if(p.spring && Math.abs(player.x-p.x)<16){
            player.vy = SPRINGV; p.sprT=0.4; sfx.spring(); player.squash=0.3;
          }else{
            player.vy = BOUNCE; sfx.boing(); player.squash=0.22;
          }
          gliding=false;
          parts.push({x:player.x, y:p.y+2, vx:-40, vy:-20, life:0.3, type:'puff', size:5, rot:0, vr:0, color:'#cfc9b8'});
          parts.push({x:player.x, y:p.y+2, vx:40, vy:-20, life:0.3, type:'puff', size:5, rot:0, vr:0, color:'#cfc9b8'});
          if(p.type==='crumble'){
            p.dead=true; sfx.crack();
            parts.push({x:p.x-19, y:p.y+6, vx:-70, vy:40, life:0.8, type:'halfL', size:1, rot:p.rot, vr:-3, color:''});
            parts.push({x:p.x+19, y:p.y+6, vx:70, vy:40, life:0.8, type:'halfR', size:1, rot:p.rot, vr:3, color:''});
          }
        }
      }
    }
    // item pickup
    if(p.item && !p.dead){
      const iy = p.y - 26 + Math.sin(t*3+p.x)*3;
      if(Math.hypot(player.x-p.x, player.y-iy) < 32){
        if(p.item.kind==='web'){ webAmmo=Math.min(12, webAmmo+p.item.amt); }
        else { glideAmmo=Math.min(12, glideAmmo+p.item.amt); }
        floats.push({x:p.x, y:iy-14, text:'+'+p.item.amt+(p.item.kind==='web'?' WEB':' GLIDE'),
          life:1.1, size:16, color: p.item.kind==='web'?'#c9302c':BLUE});
        p.item=null; sfx.pickup();
      }
    }
  }
  platforms = platforms.filter(p=> !p.dead && p.y < cam.y+H+90);

  // ----- camera & scoring -----
  if(state==='PLAY'){
    if(player.y < minY) minY = player.y;
    const target = player.y - 300;
    if(target < cam.y) cam.y += (target-cam.y)*Math.min(1, 14*dt);
    genUpTo(cam.y - 320);
    if(score() >= milestone && score() < nextBossAt){
      floats.push({x:W/2, y:cam.y+200, text: milestone.toLocaleString()+'!', life:1.4, size:26, color:'#4c7f1f'});
      milestone += 5000;
    }
    if(score() >= nextBossAt) triggerBoss();
  }
  spawnClouds();

  // ----- boss -----
  if(state==='BOSSINTRO'){
    updateBoss(dt);
    if(stateT>1.6){ state='BOSS'; boss.st='hover'; boss.stT=0; }
  }else if(state==='BOSS'){
    updateBoss(dt);
    if(boss) bossCollide();
  }else if(state==='BOSSWIN'){
    if(stateT>1.8){ state='PLAY'; for(const p of platforms) p.arena=false; genY=Math.min(genY, cam.y+300); }
  }
  // sand globs
  for(let i=globs.length-1;i>=0;i--){
    const g=globs[i];
    g.vy += 460*dt; g.x+=g.vx*dt; g.y+=g.vy*dt;
    if(g.y-cam.y > H+50 || g.x<-40 || g.x>W+40){ globs.splice(i,1); continue; }
    if(respawnInv<=0 && Math.hypot(player.x-g.x, player.y-g.y) < g.r+13){ die(); return; }
  }

  // fell off the bottom
  if(player.y - cam.y > H+80) die();
}

// ================= 12. RENDER =================
function sy(wy){ return wy - cam.y; }
function txt(str, x, y, size, o){
  o=o||{};
  ctx.save();
  ctx.translate(x,y); if(o.rot) ctx.rotate(o.rot);
  ctx.font = (o.weight||'700')+' '+size+'px '+FONT;
  ctx.textAlign = o.align||'center';
  ctx.textBaseline = o.base||'middle';
  ctx.globalAlpha = o.alpha==null?1:o.alpha;
  if(o.halo!==false){
    ctx.lineWidth = size/6+2; ctx.strokeStyle='rgba(249,246,236,.85)';
    ctx.strokeText(str,0,0);
  }
  ctx.fillStyle = o.color||INK;
  ctx.fillText(str,0,0);
  ctx.restore(); ctx.globalAlpha=1;
}
function paper(x, y, w, h, rot, seed){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot||0);
  const rng = mulberry32(seed||7);
  ctx.shadowColor='rgba(60,50,30,.25)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  inkPath(ctx, rng, rrectPts(-w/2,-h/2,w,h,6), {fill:'#fffdf4', stroke:INK, lw:2.6, jit:1.6});
  ctx.shadowColor='transparent';
  inkPath(ctx, rng, rrectPts(-w/2+5,-h/2+5,w-10,h-10,4), {fill:null, stroke:'#b9b2a0', lw:1, jit:1});
  ctx.restore();
}
let gridPat=null;
function makeGrid(){
  const c=document.createElement('canvas'); c.width=26; c.height=26;
  const g=c.getContext('2d');
  g.strokeStyle='rgba(140,165,200,.35)'; g.lineWidth=1;
  g.beginPath(); g.moveTo(0,25.5); g.lineTo(26,25.5); g.stroke();
  g.beginPath(); g.moveTo(25.5,0); g.lineTo(25.5,26); g.stroke();
  gridPat = ctx.createPattern(c,'repeat');
}
makeGrid();

function render(){
  ctx.setTransform(RS,0,0,RS,0,0);
  // paper
  ctx.fillStyle='#f9f6ec'; ctx.fillRect(0,0,W,H);
  // ?gallery=1 — sprite sheet for art verification
  if(Q.get('gallery')){
    ctx.save(); ctx.translate(0,-(0%26));
    ctx.fillStyle=gridPat; ctx.fillRect(0,0,W,H);
    ctx.restore();
    const keys=Object.keys(SPR);
    let gx=50, gy=54;
    for(const k of keys){
      const s=SPR[k];
      const sc=Math.min(1, 86/Math.max(s.w,s.h));
      drawSpr(k, gx, gy, {s:sc});
      txt(k, gx, gy+52, 10, {halo:false, color:'#8a8578'});
      gx+=96;
      if(gx>W-46){ gx=50; gy+=118; }
    }
    return;
  }
  ctx.save();
  ctx.translate(0, -(cam.y%26));
  ctx.fillStyle=gridPat; ctx.fillRect(-26,-26,W+52,H+78);
  ctx.restore();
  // red margin line
  ctx.strokeStyle='rgba(226,120,120,.4)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(34,0); ctx.lineTo(34,H); ctx.stroke();

  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake, (Math.random()-.5)*shake);

  // scenery
  for(const c of clouds){
    const cy = c.py - cam.y*c.p;
    if(cy<-140||cy>H+140) continue;
    drawSpr(c.key, c.x, cy, {alpha:c.alpha, shadow:false, sx:c.sx||1});
  }
  // skyline near the start
  const skY = sy(120);
  if(skY > -160 && skY < H+80) drawSpr('skyline', W/2, skY, {shadow:false, alpha:0.9});

  // vignette during boss
  if(state==='BOSS'||state==='BOSSINTRO'||state==='BOSSWIN'){
    const g = ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.75);
    g.addColorStop(0,'rgba(60,40,30,0)'); g.addColorStop(1,'rgba(60,40,30,.20)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // platforms
  for(const p of platforms){
    const py = sy(p.y);
    if(py<-40||py>H+40) continue;
    drawSpr('plat_'+p.type, p.x, py+7, {rot:p.rot});
    if(p.spring){
      const ext = p.sprT>0;
      drawSpr(ext?'spring1':'spring0', p.x, py - (ext?14:7), {shadow:false});
    }
    if(p.item){
      const iy = py - 26 + Math.sin(t*3+p.x)*3;
      drawSpr(p.item.kind==='web'?'it_web':'it_wing', p.x, iy);
      // count badge
      ctx.save();
      ctx.translate(p.x+15, iy-10); ctx.rotate(0.15);
      ctx.fillStyle = p.item.kind==='web' ? '#c9302c' : BLUE;
      ctx.beginPath(); ctx.arc(0,0,8.5,0,TAU); ctx.fill();
      ctx.strokeStyle=INK; ctx.lineWidth=1.6; ctx.stroke();
      ctx.font='700 11px Arial,sans-serif'; ctx.fillStyle='#fff';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.item.amt, 0, 1);
      ctx.restore();
    }
  }

  // boss + globs
  if(boss){
    const by = sy(boss.y);
    const key = (boss.kind==='sandman'?'sm_':'rh_')+boss.pose;
    const flash = boss.inv>0 && Math.floor(t*18)%2===0;
    drawSpr(key, boss.x, by, {sx: boss.kind==='rhino' ? boss.dir : (boss.dir||1), alpha: flash?0.35:1});
    if(boss.kind==='rhino' && boss.pose==='dizzy'){
      for(let i=0;i<3;i++){
        const a=t*4+i*TAU/3;
        const px=boss.x+Math.cos(a)*30, py2=by-44+Math.sin(a)*7;
        txt('✦', px, py2, 15, {color:'#d4a017', halo:false});
      }
    }
    // HP pips — boss-coloured dots (spidey masks are the PLAYER's lives)
    const bcol = boss.kind==='sandman' ? SAND : RHG;
    const bedge = boss.kind==='sandman' ? SANDD : RHD;
    for(let i=0;i<5;i++){
      const px = W/2-52+i*26;
      ctx.beginPath(); ctx.arc(px,66,7,0,TAU);
      if(i < boss.hp){
        ctx.fillStyle=bcol; ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle=bedge; ctx.stroke();
      }else{
        ctx.lineWidth=2; ctx.strokeStyle='rgba(42,38,32,.35)'; ctx.stroke();
      }
    }
  }
  for(const g of globs) drawSpr('glob', g.x, sy(g.y), {rot:t*6});

  // zip line
  if(zip){
    const ax=zip.a.p.x+zip.a.ox, ay=sy(zip.a.y);
    const hx=player.x+5*player.face, hy=sy(player.y)-30;
    const rng=mulberry32(boilFrame*13+7);
    ctx.save(); ctx.strokeStyle='#8a8578'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(hx,hy);
    for(let i=1;i<=4;i++){
      const tt=i/4;
      ctx.lineTo(lerp(hx,ax,tt)+(rng()-.5)*4, lerp(hy,ay,tt)+(rng()-.5)*4);
    }
    ctx.stroke();
    // anchor splat
    for(let i=0;i<4;i++){
      const a=i/4*TAU+0.4;
      ctx.beginPath(); ctx.moveTo(ax,ay);
      ctx.lineTo(ax+Math.cos(a)*7, ay+Math.sin(a)*7); ctx.stroke();
    }
    ctx.restore();
  }

  // player (hidden on title — a demo spidey is drawn there instead)
  if(state!=='TITLE'){
    const py = sy(player.y);
    const sq = player.squash>0 ? Math.sin(player.squash/0.25*Math.PI)*0.18 : 0;
    drawSpr('spidey_'+player.pose, player.x, py, {
      sx: player.face*(1+sq), sy: 1-sq,
      alpha: respawnInv>0 ? (Math.floor(t*14)%2 ? 0.3 : 0.85) : 1,
      rot: state==='DEAD'? player.spin : clamp(player.vx/900, -0.18, 0.18)
    });
  }

  // particles
  for(const p of parts){
    const py=sy(p.y);
    ctx.save(); ctx.globalAlpha=clamp(p.life*2,0,1);
    if(p.type==='shard'||p.type==='sand'){
      ctx.translate(p.x,py); ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      if(p.type==='sand'){ ctx.beginPath(); ctx.arc(0,0,p.size/1.6,0,TAU); ctx.fill(); }
      else ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size/1.5);
      ctx.strokeStyle='rgba(42,38,32,.5)'; ctx.lineWidth=1;
      if(p.type!=='sand') ctx.strokeRect(-p.size/2,-p.size/3,p.size,p.size/1.5);
    }else if(p.type==='puff'){
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,py,p.size*(1.6-p.life),0,TAU); ctx.fill();
    }else if(p.type==='wind'){
      ctx.strokeStyle=p.color; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(p.x,py); ctx.lineTo(p.x, py-p.size); ctx.stroke();
    }else if(p.type==='halfL'||p.type==='halfR'){
      drawSpr('plat_'+p.type, p.x, py, {rot:p.rot, alpha:clamp(p.life*1.6,0,1)});
    }
    ctx.restore();
  }
  // floaters
  for(const f of floats)
    txt(f.text, f.x, sy(f.y), f.size, {color:f.color, alpha:clamp(f.life*1.6,0,1)});

  ctx.restore(); // shake

  // ---------- HUD ----------
  if(state!=='TITLE'){
    paper(84, 38, 148, 46, -0.03, 11);
    txt('SCORE', 40, 30, 12, {align:'left', color:'#8a8578', halo:false});
    txt(score().toLocaleString(), 40, 47, 24, {align:'left'});
    // ammo
    const ammoRow=(y, key, n, flash)=>{
      drawSpr(key, W-66, y, {shadow:false, s:0.9, alpha: n>0?1:0.35});
      txt('× '+n, W-46, y, 18, {align:'left',
        color: flash>0 ? '#c9302c' : (n>0?INK:'#a39d8e')});
    };
    ammoRow(30, 'it_web', webAmmo, flashAmmo);
    ammoRow(58, 'it_wing', glideAmmo, flashAmmo2);
    // player lives during boss fights — small spidey masks under the score
    if(state==='BOSSINTRO'||state==='BOSS'||state==='BOSSWIN'){
      for(let i=0;i<3;i++)
        drawSpr('pip', 34+i*24, 80, {shadow:false, s:1.15, alpha: i<bossLives?1:0.20});
    }
    if(hintT>0 && state==='PLAY')
      txt(IS_TOUCH ? 'tilt to move · tap = web · hold = glide'
                   : '← → move · L-click web up · R-click hold glide',
        W/2, H-26, 14, {color:'#8a8578', alpha:clamp(hintT,0,1)});
    // fallback ◀ ▶ buttons when no tilt sensor is available
    if(fallbackBtns() && (state==='PLAY'||state==='BOSS'||state==='BOSSWIN'||state==='BOSSINTRO') && !paused){
      for(const [bx,dir] of [[54,-1],[W-54,1]]){
        ctx.save(); ctx.globalAlpha=0.32;
        ctx.beginPath(); ctx.arc(bx,H-64,44,0,TAU);
        ctx.fillStyle='#2a2620'; ctx.fill();
        ctx.fillStyle='#f9f6ec';
        ctx.beginPath();
        ctx.moveTo(bx+dir*16, H-64);
        ctx.lineTo(bx-dir*8, H-64-16);
        ctx.lineTo(bx-dir*8, H-64+16);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }
    }
  }
  if(state==='BOSSINTRO'||((state==='BOSS')&&stateT<1)){
    const name = bossKind==='sandman'?'THE SANDMAN':'THE RHINO';
    paper(W/2, 150, 330, 86, -0.02, 23);
    txt(name+'!!', W/2, 138, 34, {color:'#c9302c', rot:-0.02});
    txt('stomp his head ×5 — dodge the '+(bossKind==='sandman'?'sand!':'horn!'), W/2, 170, 14);
  }
  if(state==='BOSSWIN'){
    txt('BOSS DOWN!', W/2, 200, 40, {color:'#4c7f1f', rot:-0.03});
  }
  if(paused && state!=='TITLE' && state!=='DEAD'){
    ctx.fillStyle='rgba(249,246,236,.6)'; ctx.fillRect(0,0,W,H);
    paper(W/2, H/2, 250, 90, 0.02, 31);
    txt('PAUSED', W/2, H/2-8, 30);
    txt('press P', W/2, H/2+22, 14, {color:'#8a8578'});
  }

  // ---------- TITLE ----------
  if(state==='TITLE'){
    // demo spidey bouncing
    const by = 300 - Math.abs(Math.sin(t*2.6))*120;
    drawSpr('plat_normal', W/2, 312);
    boilFrame=Math.floor(t*5);
    drawSpr('spidey_'+(Math.sin(t*2.6+Math.PI/2)>0?'bounce':'fall'), W/2, by-30);
    paper(W/2, 120, 380, 130, -0.015, 41);
    txt('SPIDEY', W/2-3, 96, 58, {color:'#c9302c', rot:-0.02});
    txt('JUMP', W/2+3, 150, 44, {color:BLUE, rot:0.015});
    // web underline
    ctx.save(); ctx.strokeStyle='#8a8578'; ctx.lineWidth=2; ctx.globalAlpha=.7;
    const rng=mulberry32(5);
    inkLine(ctx, rng, W/2-120, 178, W/2+120, 178, {stroke:'#8a8578', lw:2, jit:1.4});
    ctx.restore();
    paper(W/2, 470, 380, 168, 0.012, 43);
    const L=(str,y,ic)=>{ if(ic)drawSpr(ic, W/2-158, y, {shadow:false, s:0.8}); txt(str, W/2-136, y, 15, {align:'left'}); };
    if(IS_TOUCH){
      L('TILT phone — move left / right', 408);
      txt('TAP', W/2-136, 438, 15, {align:'left', color:'#c9302c'});
      txt('— web-zip straight up', W/2-92, 438, 15, {align:'left'});
      drawSpr('it_web', W/2-158, 438, {shadow:false, s:0.8});
      txt('HOLD', W/2-136, 468, 15, {align:'left', color:BLUE});
      txt('— glide down slowly', W/2-86, 468, 15, {align:'left'});
      drawSpr('it_wing', W/2-158, 468, {shadow:false, s:0.8});
    }else{
      L('← → or A / D — move', 408);
      txt('L-CLICK', W/2-136, 438, 15, {align:'left', color:'#c9302c'});
      txt('— web-zip straight up', W/2-64, 438, 15, {align:'left'});
      drawSpr('it_web', W/2-158, 438, {shadow:false, s:0.8});
      txt('R-CLICK', W/2-136, 468, 15, {align:'left', color:BLUE});
      txt('hold — glide down slowly', W/2-64, 468, 15, {align:'left'});
      drawSpr('it_wing', W/2-158, 468, {shadow:false, s:0.8});
    }
    L('every 10,000 — a BOSS. stomp his head ×5!', 502);
    L('dodge sand & horns — 3 lives per boss!', 528);
    if(best>0) txt('BEST '+best.toLocaleString(), W/2, 570, 20, {color:'#4c7f1f'});
    txt(IS_TOUCH ? 'TAP to start' : 'CLICK or SPACE to start', W/2, 640, 22,
      {alpha: 0.55+0.45*Math.sin(t*4), color:INK});
    if(!IS_TOUCH) txt('P pause · M mute', W/2, 692, 12, {color:'#8a8578'});
  }

  // ---------- GAME OVER ----------
  if(state==='DEAD' && deadT>0.5){
    ctx.fillStyle='rgba(249,246,236,.45)'; ctx.fillRect(0,0,W,H);
    paper(W/2, H/2-20, 360, 240, -0.015, 53);
    txt('THWIPPED OUT!', W/2, H/2-110, 34, {color:'#c9302c', rot:-0.02});
    txt('SCORE', W/2, H/2-64, 15, {color:'#8a8578'});
    txt(score().toLocaleString(), W/2, H/2-30, 44);
    txt('BEST  '+best.toLocaleString(), W/2, H/2+16, 18, {color:'#4c7f1f'});
    if(newBest){
      ctx.save(); ctx.translate(W/2+120, H/2-60); ctx.rotate(0.3+Math.sin(t*6)*0.06);
      ctx.fillStyle='#d4a017';
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const r=i%2?18:34, a=i/10*TAU;
        ctx[i?'lineTo':'moveTo'](Math.cos(a)*r, Math.sin(a)*r);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle=INK; ctx.lineWidth=2; ctx.stroke();
      txt('NEW', 0, -6, 13, {color:'#fff', halo:false});
      txt('BEST', 0, 8, 13, {color:'#fff', halo:false});
      ctx.restore();
    }
    if(deadT>0.6)
      txt(IS_TOUCH ? 'TAP — go again' : 'CLICK or SPACE — go again', W/2, H/2+70, 18,
        {alpha:0.55+0.45*Math.sin(t*4)});
  }

  // ---------- web target marker (the web fires straight up) ----------
  if((state==='PLAY'||state==='BOSS') && !paused && !zip && webAmmo>0){
    const a = findAnchor();
    if(a){
      const axx=a.p.x+a.ox, ayy=sy(a.y);
      const pyy=sy(player.y)-30;
      ctx.save();
      // faint dotted line from spidey up to the latch point
      ctx.strokeStyle='rgba(42,38,32,.30)'; ctx.lineWidth=1.6;
      ctx.setLineDash([2,7]);
      ctx.beginPath(); ctx.moveTo(player.x, pyy); ctx.lineTo(axx, ayy+4); ctx.stroke();
      ctx.setLineDash([]);
      // pulsing latch target
      ctx.strokeStyle='#c9302c'; ctx.lineWidth=2;
      const r=6+Math.sin(t*8)*1.5;
      ctx.beginPath(); ctx.arc(axx, ayy+4, r, 0, TAU); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(axx, ayy+4-r-4); ctx.lineTo(axx, ayy+4+r+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(axx-r-4, ayy+4); ctx.lineTo(axx+r+4, ayy+4); ctx.stroke();
      ctx.restore();
    }
  }
  cv.style.cursor = (state==='TITLE'||state==='DEAD') ? 'pointer' : 'crosshair';
  // iOS motion-permission button lives on the title screen only
  document.getElementById('tiltBtn').style.display =
    (needsTiltPermission && !tiltGranted && state==='TITLE') ? 'block' : 'none';
}

// ================= 13. MAIN LOOP =================
const FREEZE = parseFloat(Q.get('freeze')||'0');
let last=performance.now();
function frame(now){
  const dt = Math.min(0.033, Math.max(0, (now-last)/1000));
  last=now;
  try{ update(dt); render(); }
  catch(err){
    const d=document.getElementById('fatal');
    d.style.display='block';
    d.textContent='JS ERROR: '+err.message+'\n'+(err.stack||'');
    return;
  }
  // ?freeze=N — stop the loop after N seconds (headless screenshot verification)
  if(FREEZE && t>=FREEZE) return;
  requestAnimationFrame(frame);
}
resetGame(); state='TITLE';
if(Q.get('start')||Q.get('boss')) startGame();
requestAnimationFrame(frame);
</script>
