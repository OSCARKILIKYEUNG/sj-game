<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spidey Jump</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex,nofollow">
<style>
  html,body{margin:0;padding:0;height:100%;background:#e8e2d0;overflow:hidden;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none;
    -webkit-touch-callout:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{box-shadow:0 6px 30px rgba(60,50,30,.35);border-radius:4px;background:#f9f6ec;
    touch-action:none;}
  #tiltBtn{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:12%;
    z-index:50;background:#e23c3a;color:#fff;border:3px solid #2a2620;border-radius:12px;
    padding:12px 22px;font:700 17px "Segoe Print","Comic Sans MS",cursive;
    box-shadow:0 4px 14px rgba(60,50,30,.4);}
  #fatal{display:none;position:fixed;inset:20px;background:#fff3f3;color:#a00;
    font:14px/1.5 monospace;padding:16px;border:3px solid #a00;border-radius:6px;
    white-space:pre-wrap;z-index:99;}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<button id="tiltBtn">ENABLE TILT 開啟重力感應</button>
<div id="fatal"></div>
<script>
// fatal error overlay — registered BEFORE the game bundle so even a
// load-time error (sprite baking etc.) is visible, incl. headless shots
window.addEventListener('error', function(e){
  var d = document.getElementById('fatal');
  d.style.display = 'block';
  d.textContent = 'JS ERROR: ' + e.message + '\n' + (e.filename || '') + ':' + e.lineno;
});
</script>
<script>
/* ================================================================
   SPIDEY JUMP — a hand-drawn doodle-jump homage
   Art: all drawn in code with jittered "ink" strokes + boiling-line
   animation (2 baked variants per sprite cycled at ~5fps).
   BUILT FILE — do not edit by hand. Source lives in src/*.js;
   rebuild with:  node build.mjs
   ================================================================ */
"use strict";
(() => {
  // src/util.js
  var W = 480;
  var H = 720;
  var TAU = Math.PI * 2;
  var INK = "#2a2620";
  var FONT = '"Segoe Print","Comic Sans MS","Chalkboard SE",cursive';
  var Q = new URLSearchParams(location.search);
  var RED = "#e23c3a";
  var REDD = "#a8201f";
  var BLUE = "#3763c9";
  var WEBRED = "#7c1414";
  var SAND = "#d9b077";
  var SANDD = "#8a6134";
  var SGRN = "#4e9b4e";
  var SGRND = "#2f6b2f";
  var RHG = "#a7abb3";
  var RHD = "#565b63";
  var RHB = "#cdd0d5";
  var GOLD = "#e0a92c";
  var GOLDD = "#8a6210";
  var IRONR = "#c22f2c";
  var IROND = "#7e1a18";
  function clamp(v, a, b) {
    return v < a ? a : v > b ? b : v;
  }
  function lerp(a, b, t) {
    return a + (b - a) * t;
  }
  function mulberry32(seed) {
    return function() {
      seed |= 0;
      seed = seed + 1831565813 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function hash(s) {
    let h = 9;
    for (let i = 0; i < s.length; i++) h = Math.imul(h ^ s.charCodeAt(i), 387420489);
    return h ^ h >>> 9;
  }

  // src/screen.js
  var cv = document.getElementById("game");
  var ctx = cv.getContext("2d");
  var RS = Math.min(2, window.devicePixelRatio || 1);
  cv.width = W * RS;
  cv.height = H * RS;
  function fit() {
    const s = Math.min(innerWidth / W, innerHeight / H) * 0.985;
    cv.style.width = W * s + "px";
    cv.style.height = H * s + "px";
  }
  addEventListener("resize", fit);
  fit();

  // src/world.js
  var GRAV = 2200;
  var BOUNCE = -820;
  var SPRINGV = -1350;
  var MAXVX = 380;
  var ACCEL = 2500;
  var ZIP_RANGE = 340;
  var ZIP_SPEED = 1300;
  var GLIDE_CAP = 135;
  var BOSS_HP = 3;
  var MAX_LIVES = 3;
  var ENEMY_START = 5e3;
  var COP_START = 8e3;
  var CITIZEN_START = 4200;
  var IRON_SPEED = 900;
  var IRON_DUR = 2.4;
  var PB_X = 480 - 36;
  var PB_Y = 94;
  var PB_R = 17;
  var G = {
    state: "TITLE",
    paused: false,
    t: 0,
    shake: 0,
    boilFrame: 0,
    cam: { y: 0 },
    player: null,
    platforms: [],
    globs: [],
    parts: [],
    floats: [],
    clouds: [],
    boss: null,
    enemies: [],
    bullets: [],
    minY: 0,
    bonus: 0,
    best: 0,
    nextBossAt: 0,
    bossCount: 0,
    hintT: 0,
    webAmmo: 0,
    glideAmmo: 0,
    gliding: false,
    zip: null,
    zipCD: 0,
    knockCD: 0,
    lives: 3,
    respawnInv: 0,
    ironCarry: null,
    webFlash: null,
    genY: 0,
    lastSafeX: 0,
    lastSafeCrumble: false,
    itemNextH: 0,
    ironNextH: 0,
    enemyNextH: 0,
    citizenNextH: 0,
    cloudNext: [0, 0],
    webDoodadNext: 0,
    roofDoodadNext: 0,
    stateT: 0,
    bossKind: "",
    deadT: 0,
    newBest: false,
    milestone: 0,
    flashAmmo: 0,
    flashAmmo2: 0,
    keys: { l: false, r: false },
    mouse: { x: 240, y: 360 },
    tilt: 0,
    tiltActive: false,
    tiltGranted: false,
    touchState: null
  };
  try {
    G.best = parseInt(localStorage.getItem("sjBest") || "0", 10) || 0;
  } catch (e) {
  }
  function heightClimbed() {
    return Math.max(0, -G.minY);
  }
  function score() {
    return Math.floor(heightClimbed()) + G.bonus;
  }
  function diffT(h) {
    return clamp(h / 26e3, 0, 1);
  }

  // src/sketch.js
  function jitterPts(pts, jit, rng, closed) {
    const res = [], n = pts.length, segs = closed ? n : n - 1;
    for (let i = 0; i < segs; i++) {
      const a = pts[i], b = pts[(i + 1) % n];
      const d = Math.hypot(b[0] - a[0], b[1] - a[1]);
      const steps = Math.max(2, Math.round(d / 7));
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        res.push([
          a[0] + (b[0] - a[0]) * t + (rng() - 0.5) * jit * 2,
          a[1] + (b[1] - a[1]) * t + (rng() - 0.5) * jit * 2
        ]);
      }
    }
    if (!closed) res.push([pts[n - 1][0], pts[n - 1][1]]);
    return res;
  }
  function pathFrom(g, pts, closed) {
    g.beginPath();
    g.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i][0], pts[i][1]);
    if (closed) g.closePath();
  }
  function inkPath(g, rng, pts, o) {
    o = o || {};
    const closed = o.closed !== false;
    const jit = o.jit == null ? 1.3 : o.jit;
    const j = jitterPts(pts, jit, rng, closed);
    pathFrom(g, j, closed);
    if (o.fill) {
      g.fillStyle = o.fill;
      g.fill();
    }
    if (o.stroke !== null) {
      g.strokeStyle = o.stroke || INK;
      g.lineWidth = o.lw || 2.2;
      g.stroke();
      if (o.rough !== false) {
        const j2 = jitterPts(pts, jit * 1.5, rng, closed);
        pathFrom(g, j2, closed);
        g.globalAlpha *= 0.3;
        g.lineWidth = (o.lw || 2.2) * 0.6;
        g.stroke();
        g.globalAlpha /= 0.3;
      }
    }
  }
  function inkLine(g, rng, x1, y1, x2, y2, o) {
    inkPath(g, rng, [[x1, y1], [x2, y2]], Object.assign({ closed: false, fill: null }, o));
  }
  function ellipsePts(cx, cy, rx, ry, rot, n) {
    rot = rot || 0;
    n = n || 18;
    const p = [];
    const c = Math.cos(rot), s = Math.sin(rot);
    for (let i = 0; i < n; i++) {
      const a = i / n * TAU;
      let x = Math.cos(a) * rx, y = Math.sin(a) * ry;
      p.push([cx + x * c - y * s, cy + x * s + y * c]);
    }
    return p;
  }
  function blobPts(rng, cx, cy, r, irr, n) {
    irr = irr == null ? 0.22 : irr;
    n = n || 12;
    const p = [];
    for (let i = 0; i < n; i++) {
      const a = i / n * TAU, rr = r * (1 + (rng() - 0.5) * 2 * irr);
      p.push([cx + Math.cos(a) * rr, cy + Math.sin(a) * rr]);
    }
    return p;
  }
  function rrectPts(x, y, w, h, r) {
    return [[x + r, y], [x + w - r, y], [x + w, y + r], [x + w, y + h - r], [x + w - r, y + h], [x + r, y + h], [x, y + h - r], [x, y + r]];
  }
  function limb(g, rng, pts, color, w) {
    inkPath(g, rng, pts, { closed: false, fill: null, stroke: INK, lw: w + 2.6, jit: 0.7, rough: false });
    inkPath(g, rng, pts, { closed: false, fill: null, stroke: color, lw: w, jit: 0.7, rough: false });
  }
  function streaks(g, rng, cx, cy, w, h, color, n) {
    g.save();
    g.globalAlpha = 0.16;
    g.strokeStyle = color;
    g.lineWidth = 3;
    for (let i = 0; i < (n || 3); i++) {
      const y = cy - h / 2 + h * (0.25 + 0.5 * rng());
      const x0 = cx - w * 0.32 + rng() * 10, x1 = cx + w * 0.32 - rng() * 10;
      g.beginPath();
      g.moveTo(x0, y + (rng() - 0.5) * 3);
      g.lineTo(x1, y + (rng() - 0.5) * 3);
      g.stroke();
    }
    g.restore();
  }

  // src/sprites.js
  var SPR = {};
  function bake(key, w, h, fn, variants) {
    variants = variants || 2;
    const arr = [], sh = [];
    for (let v = 0; v < variants; v++) {
      const c = document.createElement("canvas");
      c.width = w * 2;
      c.height = h * 2;
      const g = c.getContext("2d");
      g.scale(2, 2);
      g.lineJoin = "round";
      g.lineCap = "round";
      fn(g, mulberry32(hash(key) + v * 7919), v);
      arr.push(c);
      const sc = document.createElement("canvas");
      sc.width = w * 2;
      sc.height = h * 2;
      const sg = sc.getContext("2d");
      sg.drawImage(c, 0, 0);
      sg.globalCompositeOperation = "source-in";
      sg.fillStyle = "#000";
      sg.fillRect(0, 0, sc.width, sc.height);
      sh.push(sc);
    }
    SPR[key] = { c: arr, sh, w, h };
  }
  function drawSpr(key, x, y, o) {
    o = o || {};
    const s = SPR[key];
    const idx = (G.boilFrame % s.c.length + s.c.length) % s.c.length;
    const img = s.c[idx];
    const sx = (o.sx || 1) * (o.s || 1), sy2 = (o.sy || 1) * (o.s || 1);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(o.rot || 0);
    ctx.scale(sx, sy2);
    if (o.shadow !== false) {
      ctx.globalAlpha = (o.alpha == null ? 1 : o.alpha) * 0.12;
      ctx.drawImage(s.sh[idx], -s.w / 2 + 3, -s.h / 2 + 4, s.w, s.h);
    }
    ctx.globalAlpha = o.alpha == null ? 1 : o.alpha;
    ctx.drawImage(img, -s.w / 2, -s.h / 2, s.w, s.h);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  function spideyHead(g, rng, cx, cy, sc) {
    sc = sc || 1;
    inkPath(g, rng, ellipsePts(cx, cy, 13.5 * sc, 12.5 * sc), { fill: RED, lw: 2.4 });
    g.save();
    g.globalAlpha = 0.18;
    g.fillStyle = REDD;
    g.beginPath();
    g.ellipse(cx + 5 * sc, cy + 3 * sc, 8 * sc, 9 * sc, -0.4, 0, TAU);
    g.fill();
    g.restore();
    g.save();
    g.globalAlpha = 0.75;
    for (let i = -2; i <= 2; i++) {
      inkLine(
        g,
        rng,
        cx + i * 4.6 * sc,
        cy - 12 * sc + Math.abs(i) * 1.4 * sc,
        cx + i * 6.4 * sc,
        cy + 11 * sc - Math.abs(i) * 2.2 * sc,
        { stroke: WEBRED, lw: 0.9, jit: 0.7, rough: false }
      );
    }
    inkPath(g, rng, ellipsePts(cx, cy - 3 * sc, 11.5 * sc, 5.5 * sc, 0, 14), { fill: null, stroke: WEBRED, lw: 0.9, jit: 0.6, rough: false });
    inkPath(g, rng, ellipsePts(cx, cy + 4 * sc, 10.5 * sc, 5 * sc, 0, 14), { fill: null, stroke: WEBRED, lw: 0.9, jit: 0.6, rough: false });
    g.restore();
    inkPath(g, rng, ellipsePts(cx - 6.4 * sc, cy + 0.6 * sc, 5.4 * sc, 3.8 * sc, -0.42, 14), { fill: "#fdfdf6", lw: 1.8, jit: 0.5 });
    inkPath(g, rng, ellipsePts(cx + 6.4 * sc, cy + 0.6 * sc, 5.4 * sc, 3.8 * sc, 0.42, 14), { fill: "#fdfdf6", lw: 1.8, jit: 0.5 });
  }
  function spideyEmblem(g, rng, cx, cy) {
    inkLine(g, rng, cx, cy - 2.4, cx, cy + 2.6, { lw: 1.6, jit: 0.3, rough: false });
    for (const s of [-1, 1]) {
      inkLine(g, rng, cx, cy - 1, cx + 3.4 * s, cy - 2.8, { lw: 1, jit: 0.3, rough: false });
      inkLine(g, rng, cx, cy, cx + 3.8 * s, cy + 0.4, { lw: 1, jit: 0.3, rough: false });
      inkLine(g, rng, cx, cy + 1, cx + 3.2 * s, cy + 3, { lw: 1, jit: 0.3, rough: false });
    }
  }
  function spideyTorso(g, rng, stretch) {
    const st = stretch || 0;
    inkPath(g, rng, [[18, 29 - st], [34, 29 - st], [33, 43], [19, 43]], { fill: RED, lw: 2.2 });
    streaks(g, rng, 26, 36, 16, 12, REDD, 2);
    g.save();
    g.globalAlpha = 0.6;
    inkPath(g, rng, ellipsePts(26, 31 - st, 7.5, 3.4, 0, 12), { fill: null, stroke: WEBRED, lw: 0.8, jit: 0.5, rough: false });
    g.restore();
    spideyEmblem(g, rng, 26, 35);
    inkPath(g, rng, [[19, 43], [33, 43], [32, 50], [20, 50]], { fill: BLUE, lw: 2.2 });
  }
  function drawSpidey(g, rng, pose) {
    const glove = (x, y) => inkPath(g, rng, blobPts(rng, x, y, 3.4, 0.18, 8), { fill: RED, lw: 1.8 });
    const boot = (x, y) => inkPath(g, rng, ellipsePts(x, y, 4.4, 3, 0, 10), { fill: RED, lw: 1.8 });
    if (pose === "glide") {
      for (const s of [-1, 1]) {
        const hx = 26 + s * 22, hy = 27;
        inkPath(g, rng, [[hx, hy], [26 + s * 4, 44], [26 + s * 2, 31]], { fill: "rgba(253,253,246,.95)", lw: 1.6, jit: 0.8 });
        g.save();
        g.globalAlpha = 0.55;
        inkLine(g, rng, 26 + s * 6, 33, hx - s * 2, hy + 1, { lw: 0.8, jit: 0.5, rough: false });
        inkLine(g, rng, 26 + s * 5, 38, hx - s * 6, hy + 3, { lw: 0.8, jit: 0.5, rough: false });
        inkPath(g, rng, [[hx - s * 3, hy + 4], [26 + s * 8, 40]], { closed: false, fill: null, lw: 0.8, jit: 0.5, rough: false });
        g.restore();
      }
    }
    if (pose === "bounce") {
      limb(g, rng, [[22, 47], [16, 55], [18, 62]], BLUE, 4.2);
      boot(18, 63);
      limb(g, rng, [[30, 47], [36, 55], [34, 62]], BLUE, 4.2);
      boot(34, 63);
    } else if (pose === "fall") {
      limb(g, rng, [[22, 47], [14, 56], [12, 63]], BLUE, 4.2);
      boot(11, 64);
      limb(g, rng, [[30, 47], [38, 56], [40, 63]], BLUE, 4.2);
      boot(41, 64);
    } else if (pose === "glide") {
      limb(g, rng, [[24, 47], [22, 58], [23, 64]], BLUE, 4.2);
      boot(23, 65);
      limb(g, rng, [[28, 47], [30, 58], [29, 64]], BLUE, 4.2);
      boot(29, 65);
    } else {
      limb(g, rng, [[22, 47], [16, 57], [11, 61]], BLUE, 4.2);
      boot(10, 62);
      limb(g, rng, [[30, 47], [27, 59], [23, 64]], BLUE, 4.2);
      boot(22, 65);
    }
    spideyTorso(g, rng, pose === "zip" ? 2 : 0);
    if (pose === "bounce") {
      limb(g, rng, [[19, 31], [10, 36], [8, 42]], RED, 3.8);
      glove(7, 43);
      limb(g, rng, [[33, 31], [40, 23], [43, 16]], RED, 3.8);
      glove(44, 15);
      inkLine(g, rng, 44, 15, 48, 11, { lw: 1.2, jit: 0.4, rough: false });
      inkLine(g, rng, 44, 15, 48, 17, { lw: 1.2, jit: 0.4, rough: false });
    } else if (pose === "fall") {
      limb(g, rng, [[19, 31], [11, 24], [7, 16]], RED, 3.8);
      glove(6, 15);
      limb(g, rng, [[33, 31], [41, 24], [45, 16]], RED, 3.8);
      glove(46, 15);
    } else if (pose === "glide") {
      limb(g, rng, [[19, 30], [10, 28], [4, 27]], RED, 3.8);
      glove(3, 27);
      limb(g, rng, [[33, 30], [42, 28], [48, 27]], RED, 3.8);
      glove(49, 27);
    } else {
      limb(g, rng, [[20, 30], [19, 16], [21, 5]], RED, 3.8);
      glove(21, 4);
      limb(g, rng, [[32, 30], [31, 16], [31, 5]], RED, 3.8);
      glove(31, 4);
    }
    spideyHead(g, rng, 26, pose === "zip" ? 13 : 15, pose === "fall" ? 1.04 : 1);
  }
  ["bounce", "fall", "glide", "zip"].forEach((p) => bake("spidey_" + p, 52, 66, (g, rng) => drawSpidey(g, rng, p)));
  function platBase(g, rng, fill, edge) {
    inkPath(g, rng, rrectPts(4, 3, 68, 12, 5), { fill, stroke: edge, lw: 2.4, jit: 1.1 });
    streaks(g, rng, 38, 9, 60, 8, edge, 2);
    g.save();
    g.globalAlpha = 0.5;
    inkLine(g, rng, 12, 5.5, 30 + rng() * 20, 5.5, { stroke: "#ffffff", lw: 1.6, jit: 0.5, rough: false });
    g.restore();
  }
  bake("plat_normal", 76, 18, (g, rng) => platBase(g, rng, "#8fd14f", "#4c7f1f"));
  bake("plat_moving", 76, 18, (g, rng) => {
    platBase(g, rng, "#63aef0", "#265f9e");
    g.save();
    g.globalAlpha = 0.75;
    inkLine(g, rng, 12, 9, 6, 9, { stroke: "#265f9e", lw: 1.6, jit: 0.4, rough: false });
    inkLine(g, rng, 64, 9, 70, 9, { stroke: "#265f9e", lw: 1.6, jit: 0.4, rough: false });
    g.restore();
  });
  bake("plat_crumble", 76, 18, (g, rng) => {
    platBase(g, rng, "#d8a75e", "#8a5a25");
    inkPath(g, rng, [[36, 4], [40, 8], [36, 11], [41, 14]], { closed: false, fill: null, stroke: "#6d431a", lw: 1.4, jit: 0.5, rough: false });
    inkPath(g, rng, [[20, 5], [23, 9], [20, 13]], { closed: false, fill: null, stroke: "#6d431a", lw: 1.1, jit: 0.5, rough: false });
    inkPath(g, rng, [[56, 5], [53, 9], [56, 13]], { closed: false, fill: null, stroke: "#6d431a", lw: 1.1, jit: 0.5, rough: false });
  });
  bake("plat_rotten", 76, 20, (g, rng) => {
    inkPath(
      g,
      rng,
      [[5, 8], [20, 4], [40, 7], [58, 3], [72, 7], [70, 15], [52, 18], [30, 15], [10, 17]],
      { fill: "#9b948a", stroke: "#54504a", lw: 2.2, jit: 1.4 }
    );
    inkPath(g, rng, [[30, 6], [38, 10], [33, 14]], { closed: false, fill: null, stroke: "#3d3a35", lw: 1.6, jit: 0.6, rough: false });
    inkPath(g, rng, ellipsePts(18, 11, 3, 2.2, 0, 8), { fill: "#54504a", lw: 1, jit: 0.4 });
    inkPath(g, rng, ellipsePts(56, 11, 2.6, 2, 0, 8), { fill: "#54504a", lw: 1, jit: 0.4 });
  });
  bake("plat_halfL", 40, 18, (g, rng) => {
    inkPath(g, rng, [[4, 4], [34, 3], [30, 9], [35, 15], [6, 15]], { fill: "#d8a75e", stroke: "#8a5a25", lw: 2.2, jit: 1 });
  });
  bake("plat_halfR", 40, 18, (g, rng) => {
    inkPath(g, rng, [[6, 3], [36, 4], [34, 15], [5, 15], [10, 9]], { fill: "#d8a75e", stroke: "#8a5a25", lw: 2.2, jit: 1 });
  });

        ctx.font = "700 11px Arial,sans-serif";
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.item.kind === "iron" ? "↑" : p.item.amt, 0, 1);
        ctx.restore();
      }
    }
    for (const e of G.enemies) {
      const ey = sy(e.y);
      if (e.dead || ey < -70 || ey > H + 70) continue;
      if (e.kind === "thug") {
        drawSpr(e.st === "lunge" ? "thug_lunge" : "thug_idle", e.x, ey, { sx: e.st === "lunge" ? e.lungeDir : e.dir });
        if (e.st === "tele") txt("!", e.x + 14 * e.dir, ey - 40, 24, { color: "#c9302c" });
        if (e.webT > 0) webWrap(e.x, ey, 16);
      } else if (e.kind === "cop") {
        drawSpr(e.aim && e.webT <= 0 && e.stunT <= 0 ? "cop_aim" : "cop_idle", e.x, ey, { sx: e.dir });
        if (e.webT > 0) webWrap(e.x, ey, 16);
        else if (e.stunT > 0) {
          for (let i = 0; i < 3; i++) {
            const a = G.t * 4 + i * TAU / 3;
            txt("✦", e.x + Math.cos(a) * 18, ey - 34 + Math.sin(a) * 5, 12, { color: "#d4a017", halo: false });
          }
        }
      } else {
        drawSpr("citizen", e.x, ey);
        if (Math.sin(G.t * 2.2 + e.p.x) > 0)
          txt("HELP!", e.x, ey - 42, 13, { color: "#c9302c", rot: -0.04 });
      }
    }
    for (const b of G.bullets)
      drawSpr("bullet", b.x, sy(b.y), { rot: Math.atan2(b.vy, b.vx), shadow: false });
    if (G.boss) {
      const boss = G.boss;
      const by = sy(boss.y);
      const key = (boss.kind === "sandman" ? "sm_" : "rh_") + boss.pose;
      const flash = boss.inv > 0 && Math.floor(G.t * 18) % 2 === 0;
      drawSpr(key, boss.x, by, { sx: boss.kind === "rhino" ? boss.dir : boss.dir || 1, alpha: flash ? 0.35 : 1 });
      if (boss.kind === "rhino" && boss.pose === "dizzy") {
        for (let i = 0; i < 3; i++) {
          const a = G.t * 4 + i * TAU / 3;
          const px = boss.x + Math.cos(a) * 30, py2 = by - 44 + Math.sin(a) * 7;
          txt("✦", px, py2, 15, { color: "#d4a017", halo: false });
        }
      }
      const bcol = boss.kind === "sandman" ? SAND : RHG;
      const bedge = boss.kind === "sandman" ? SANDD : RHD;
      for (let i = 0; i < 3; i++) {
        const px = W / 2 - 26 + i * 26;
        ctx.beginPath();
        ctx.arc(px, 66, 7, 0, TAU);
        if (i < boss.hp) {
          ctx.fillStyle = bcol;
          ctx.fill();
          ctx.lineWidth = 2;
          ctx.strokeStyle = bedge;
          ctx.stroke();
        } else {
          ctx.lineWidth = 2;
          ctx.strokeStyle = "rgba(42,38,32,.35)";
          ctx.stroke();
        }
      }
    }
    for (const g of G.globs) drawSpr("glob", g.x, sy(g.y), { rot: G.t * 6 });
    if (G.zip) {
      const ax = G.zip.a.p.x + G.zip.a.ox, ay = sy(G.zip.a.y);
      const hx = G.player.x + 5 * G.player.face, hy = sy(G.player.y) - 30;
      const rng = mulberry32(G.boilFrame * 13 + 7);
      ctx.save();
      ctx.strokeStyle = "#8a8578";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hx, hy);
      for (let i = 1; i <= 4; i++) {
        const tt = i / 4;
        ctx.lineTo(lerp(hx, ax, tt) + (rng() - 0.5) * 4, lerp(hy, ay, tt) + (rng() - 0.5) * 4);
      }
      ctx.stroke();
      for (let i = 0; i < 4; i++) {
        const a = i / 4 * TAU + 0.4;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax + Math.cos(a) * 7, ay + Math.sin(a) * 7);
        ctx.stroke();
      }
      ctx.restore();
    }
    if (G.webFlash) {
      const wf = G.webFlash;
      const rng = mulberry32(G.boilFrame * 13 + 5);
      const y0 = sy(wf.y0), y1 = sy(wf.y1);
      ctx.save();
      ctx.globalAlpha = clamp(wf.t / 0.18, 0, 1);
      ctx.strokeStyle = "#8a8578";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(wf.x, y0);
      for (let i = 1; i <= 4; i++) ctx.lineTo(wf.x + (rng() - 0.5) * 4, lerp(y0, y1, i / 4));
      ctx.stroke();
      for (let i = 0; i < 5; i++) {
        const a = i / 5 * TAU + 0.3;
        ctx.beginPath();
        ctx.moveTo(wf.x, y1);
        ctx.lineTo(wf.x + Math.cos(a) * 8, y1 + Math.sin(a) * 8);
        ctx.stroke();
      }
      ctx.restore();
    }
    if (G.ironCarry && G.state !== "DEAD") {
      const py = sy(G.player.y);
      const rng = mulberry32(G.boilFrame * 17 + 3);
      ctx.save();
      ctx.strokeStyle = "#8a8578";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(G.player.x, py - 76);
      for (let i = 1; i <= 3; i++) ctx.lineTo(G.player.x + (rng() - 0.5) * 3, lerp(py - 76, py - 29, i / 3));
      ctx.stroke();
      ctx.restore();
      drawSpr("ironman", G.player.x, py - 88, { sx: G.player.face });
    }
    if (G.state !== "TITLE") {
      const py = sy(G.player.y);
      const sq = G.player.squash > 0 ? Math.sin(G.player.squash / 0.25 * Math.PI) * 0.18 : 0;
      drawSpr("spidey_" + G.player.pose, G.player.x, py, {
        sx: G.player.face * (1 + sq),
        sy: 1 - sq,
        alpha: G.respawnInv > 0 && !G.ironCarry ? Math.floor(G.t * 14) % 2 ? 0.3 : 0.85 : 1,
        rot: G.state === "DEAD" ? G.player.spin : clamp(G.player.vx / 900, -0.18, 0.18)
      });
    }
    for (const p of G.parts) {
      const py = sy(p.y);
      ctx.save();
      ctx.globalAlpha = clamp(p.life * 2, 0, 1);
      if (p.type === "shard" || p.type === "sand") {
        ctx.translate(p.x, py);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.type === "sand") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 1.6, 0, TAU);
          ctx.fill();
        } else ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size / 1.5);
        ctx.strokeStyle = "rgba(42,38,32,.5)";
        ctx.lineWidth = 1;
        if (p.type !== "sand") ctx.strokeRect(-p.size / 2, -p.size / 3, p.size, p.size / 1.5);
      } else if (p.type === "puff") {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, py, p.size * (1.6 - p.life), 0, TAU);
        ctx.fill();
      } else if (p.type === "flame") {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, py, p.size * clamp(p.life * 3, 0.2, 1), 0, TAU);
        ctx.fill();
      } else if (p.type === "wind") {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(p.x, py);
        ctx.lineTo(p.x, py - p.size);
        ctx.stroke();
      } else if (p.type === "halfL" || p.type === "halfR") {
        drawSpr("plat_" + p.type, p.x, py, { rot: p.rot, alpha: clamp(p.life * 1.6, 0, 1) });
      }
      ctx.restore();
    }
    for (const f of G.floats)
      txt(f.text, f.x, sy(f.y), f.size, { color: f.color, alpha: clamp(f.life * 1.6, 0, 1) });
    ctx.restore();
    if (G.state !== "TITLE") {
      paper(84, 38, 148, 46, -0.03, 11);
      txt("SCORE", 40, 30, 12, { align: "left", color: "#8a8578", halo: false });
      txt(score().toLocaleString(), 40, 47, 24, { align: "left" });
      const ammoRow = (y, key, n, flash) => {
        drawSpr(key, W - 66, y, { shadow: false, s: 0.9, alpha: n > 0 ? 1 : 0.35 });
        txt("× " + n, W - 46, y, 18, {
          align: "left",
          color: flash > 0 ? "#c9302c" : n > 0 ? INK : "#a39d8e"
        });
      };
      ammoRow(30, "it_web", G.webAmmo, G.flashAmmo);
      ammoRow(58, "it_wing", G.glideAmmo, G.flashAmmo2);
      for (let i = 0; i < MAX_LIVES; i++)
        drawSpr("pip", 34 + i * 24, 80, { shadow: false, s: 1.15, alpha: i < G.lives ? 1 : 0.2 });
      if (G.state === "PLAY" || G.state === "BOSS" || G.state === "BOSSINTRO" || G.state === "BOSSWIN") {
        ctx.save();
        ctx.globalAlpha = 0.85;
        inkPath(ctx, mulberry32(77), ellipsePts(PB_X, PB_Y, PB_R, PB_R, 0, 12), { fill: "#fffdf4", stroke: INK, lw: 2, jit: 0.8 });
        ctx.fillStyle = INK;
        if (!G.paused) {
          ctx.fillRect(PB_X - 6, PB_Y - 7, 4, 14);
          ctx.fillRect(PB_X + 2, PB_Y - 7, 4, 14);
        } else {
          ctx.beginPath();
          ctx.moveTo(PB_X - 4, PB_Y - 8);
          ctx.lineTo(PB_X + 8, PB_Y);
          ctx.lineTo(PB_X - 4, PB_Y + 8);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }
      if (G.hintT > 0 && G.state === "PLAY")
        txt(
          IS_TOUCH ? "tilt to move · tap = web · hold = glide" : "← → move · L-click web up · R-click hold glide",
          W / 2,
          H - 26,
          14,
          { color: "#8a8578", alpha: clamp(G.hintT, 0, 1) }
        );
      if (fallbackBtns() && (G.state === "PLAY" || G.state === "BOSS" || G.state === "BOSSWIN" || G.state === "BOSSINTRO") && !G.paused) {
        for (const [bx, dir] of [[54, -1], [W - 54, 1]]) {
          ctx.save();
          ctx.globalAlpha = 0.32;
          ctx.beginPath();
          ctx.arc(bx, H - 64, 44, 0, TAU);
          ctx.fillStyle = "#2a2620";
          ctx.fill();
          ctx.fillStyle = "#f9f6ec";
          ctx.beginPath();
          ctx.moveTo(bx + dir * 16, H - 64);
          ctx.lineTo(bx - dir * 8, H - 64 - 16);
          ctx.lineTo(bx - dir * 8, H - 64 + 16);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }
    if (G.state === "BOSSINTRO" || G.state === "BOSS" && G.stateT < 1) {
      const name = G.bossKind === "sandman" ? "THE SANDMAN" : "THE RHINO";
      paper(W / 2, 150, 330, 86, -0.02, 23);
      txt(name + "!!", W / 2, 138, 34, { color: "#c9302c", rot: -0.02 });
      txt("stomp his head ×3 — dodge the " + (G.bossKind === "sandman" ? "sand!" : "horn!"), W / 2, 170, 14);
    }
    if (G.state === "BOSSWIN") {
      txt("BOSS DOWN!", W / 2, 200, 40, { color: "#4c7f1f", rot: -0.03 });
    }
    if (G.paused && G.state !== "TITLE" && G.state !== "DEAD") {
      ctx.fillStyle = "rgba(249,246,236,.6)";
      ctx.fillRect(0, 0, W, H);
      paper(W / 2, H / 2, 250, 90, 0.02, 31);
      txt("PAUSED", W / 2, H / 2 - 8, 30);
      txt(IS_TOUCH ? "tap ▶ to resume" : "press P or click ▶", W / 2, H / 2 + 22, 14, { color: "#8a8578" });
    }
    if (G.state === "TITLE") {
      const by = 300 - Math.abs(Math.sin(G.t * 2.6)) * 120;
      drawSpr("plat_normal", W / 2, 312);
      G.boilFrame = Math.floor(G.t * 5);
      drawSpr("spidey_" + (Math.sin(G.t * 2.6 + Math.PI / 2) > 0 ? "bounce" : "fall"), W / 2, by - 30);
      paper(W / 2, 120, 380, 130, -0.015, 41);
      txt("SPIDEY", W / 2 - 3, 96, 58, { color: "#c9302c", rot: -0.02 });
      txt("JUMP", W / 2 + 3, 150, 44, { color: BLUE, rot: 0.015 });
      ctx.save();
      ctx.strokeStyle = "#8a8578";
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      const rng = mulberry32(5);
      inkLine(ctx, rng, W / 2 - 120, 178, W / 2 + 120, 178, { stroke: "#8a8578", lw: 2, jit: 1.4 });
      ctx.restore();
      paper(W / 2, 472, 380, 196, 0.012, 43);
      const L = (str, y, ic) => {
        if (ic) drawSpr(ic, W / 2 - 158, y, { shadow: false, s: 0.8 });
        txt(str, W / 2 - 136, y, 15, { align: "left" });
      };
      if (IS_TOUCH) {
        L("TILT phone — move left / right", 404);
        txt("TAP", W / 2 - 136, 432, 15, { align: "left", color: "#c9302c" });
        txt("— web-zip up / web bad guys", W / 2 - 92, 432, 15, { align: "left" });
        drawSpr("it_web", W / 2 - 158, 432, { shadow: false, s: 0.8 });
        txt("HOLD", W / 2 - 136, 460, 15, { align: "left", color: BLUE });
        txt("— glide down slowly", W / 2 - 86, 460, 15, { align: "left" });
        drawSpr("it_wing", W / 2 - 158, 460, { shadow: false, s: 0.8 });
      } else {
        L("← → or A / D — move", 404);
        txt("L-CLICK", W / 2 - 136, 432, 15, { align: "left", color: "#c9302c" });
        txt("— web-zip up / web bad guys", W / 2 - 64, 432, 15, { align: "left" });
        drawSpr("it_web", W / 2 - 158, 432, { shadow: false, s: 0.8 });
        txt("R-CLICK", W / 2 - 136, 460, 15, { align: "left", color: BLUE });
        txt("hold — glide down slowly", W / 2 - 64, 460, 15, { align: "left" });
        drawSpr("it_wing", W / 2 - 158, 460, { shadow: false, s: 0.8 });
      }
      L("every 10,000 — a BOSS. stomp his head ×3!", 492);
      L("5,000+ — thugs & cops. save citizens: +1 life!", 516);
      L("3 lives for the whole run — falling = KO!", 540);
      if (G.best > 0) txt("BEST " + G.best.toLocaleString(), W / 2, 588, 20, { color: "#4c7f1f" });
      txt(
        IS_TOUCH ? "TAP to start" : "CLICK or SPACE to start",
        W / 2,
        640,
        22,
        { alpha: 0.55 + 0.45 * Math.sin(G.t * 4), color: INK }
      );
      if (!IS_TOUCH) txt("P pause · M mute", W / 2, 692, 12, { color: "#8a8578" });
    }
    if (G.state === "DEAD" && G.deadT > 0.5) {
      ctx.fillStyle = "rgba(249,246,236,.45)";
      ctx.fillRect(0, 0, W, H);
      paper(W / 2, H / 2 - 20, 360, 240, -0.015, 53);
      txt("THWIPPED OUT!", W / 2, H / 2 - 110, 34, { color: "#c9302c", rot: -0.02 });
      txt("SCORE", W / 2, H / 2 - 64, 15, { color: "#8a8578" });
      txt(score().toLocaleString(), W / 2, H / 2 - 30, 44);
      txt("BEST  " + G.best.toLocaleString(), W / 2, H / 2 + 16, 18, { color: "#4c7f1f" });
      if (G.newBest) {
        ctx.save();
        ctx.translate(W / 2 + 120, H / 2 - 60);
        ctx.rotate(0.3 + Math.sin(G.t * 6) * 0.06);
        ctx.fillStyle = "#d4a017";
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const r = i % 2 ? 18 : 34, a = i / 10 * TAU;
          ctx[i ? "lineTo" : "moveTo"](Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = INK;
        ctx.lineWidth = 2;
        ctx.stroke();
        txt("NEW", 0, -6, 13, { color: "#fff", halo: false });
        txt("BEST", 0, 8, 13, { color: "#fff", halo: false });
        ctx.restore();
      }
      if (G.deadT > 0.6)
        txt(
          IS_TOUCH ? "TAP — go again" : "CLICK or SPACE — go again",
          W / 2,
          H / 2 + 70,
          18,
          { alpha: 0.55 + 0.45 * Math.sin(G.t * 4) }
        );
    }
    if ((G.state === "PLAY" || G.state === "BOSS") && !G.paused && !G.zip && !G.ironCarry && G.webAmmo > 0) {
      const a = findAnchor();
      if (a) {
        const axx = a.p.x + a.ox, ayy = sy(a.y);
        const pyy = sy(G.player.y) - 30;
        ctx.save();
        ctx.strokeStyle = "rgba(42,38,32,.30)";
        ctx.lineWidth = 1.6;
        ctx.setLineDash([2, 7]);
        ctx.beginPath();
        ctx.moveTo(G.player.x, pyy);
        ctx.lineTo(axx, ayy + 4);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle = "#c9302c";
        ctx.lineWidth = 2;
        const r = 6 + Math.sin(G.t * 8) * 1.5;
        ctx.beginPath();
        ctx.arc(axx, ayy + 4, r, 0, TAU);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(axx, ayy + 4 - r - 4);
        ctx.lineTo(axx, ayy + 4 + r + 4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(axx - r - 4, ayy + 4);
        ctx.lineTo(axx + r + 4, ayy + 4);
        ctx.stroke();
        ctx.restore();
      }
    }
    cv.style.cursor = G.state === "TITLE" || G.state === "DEAD" ? "pointer" : "crosshair";
    document.getElementById("tiltBtn").style.display = needsTiltPermission && !G.tiltGranted && G.state === "TITLE" ? "block" : "none";
  }
  function webWrap(x, y, r) {
    const rng = mulberry32(Math.floor(x) * 7 + 13);
    ctx.save();
    ctx.globalAlpha = 0.85;
    for (let i = 0; i < 4; i++) {
      inkLine(ctx, rng, x - r, y - 18 + i * 9, x + r, y - 13 + i * 9, { stroke: "#efece0", lw: 1.8, jit: 1, rough: false });
      inkLine(ctx, rng, x + r, y - 18 + i * 9, x - r, y - 9 + i * 9, { stroke: "#efece0", lw: 1.3, jit: 1, rough: false });
    }
    ctx.restore();
  }

  // src/hooks.js
  globalThis.__T = {
    G,
    update,
    startGame,
    tryWebShoot,
    tryGlideStart,
    bossHeadBox,
    findAnchor,
    togglePause,
    damage,
    addPlatform,
    spawnEnemy,
    get: () => ({
      state: G.state,
      boss: G.boss,
      globs: G.globs,
      platforms: G.platforms,
      player: G.player,
      webAmmo: G.webAmmo,
      glideAmmo: G.glideAmmo,
      zip: G.zip,
      gliding: G.gliding,
      nextBossAt: G.nextBossAt,
      bonus: G.bonus,
      cam: G.cam,
      score: score(),
      mouse: G.mouse,
      lives: G.lives,
      respawnInv: G.respawnInv,
      enemies: G.enemies,
      bullets: G.bullets,
      ironCarry: G.ironCarry,
      paused: G.paused
    }),
    setState: (s) => {
      G.state = s;
    },
    setNextBossAt: (v) => {
      G.nextBossAt = v;
    },
    setBossCount: (v) => {
      G.bossCount = v;
    },
    setAmmo: (w, g) => {
      G.webAmmo = w;
      G.glideAmmo = g;
    },
    setPlayer: (o) => Object.assign(G.player, o),
    setMouse: (o) => Object.assign(G.mouse, o),
    setBossHp: (v) => {
      if (G.boss) G.boss.hp = v;
    },
    setTilt: (v) => {
      G.tilt = v;
      G.tiltActive = true;
    },
    setInv: (v) => {
      G.respawnInv = v;
    },
    setLives: (v) => {
      G.lives = v;
    }
  };

  // src/main.js
  var FREEZE = parseFloat(Q.get("freeze") || "0");
  var last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, Math.max(0, (now - last) / 1e3));
    last = now;
    try {
      update(dt);
      render();
    } catch (err) {
      const d = document.getElementById("fatal");
      d.style.display = "block";
      d.textContent = "JS ERROR: " + err.message + "\n" + (err.stack || "");
      return;
    }
    if (FREEZE && G.t >= FREEZE) return;
    requestAnimationFrame(frame);
  }
  resetGame();
  G.state = "TITLE";
  if (Q.get("start") || Q.get("boss")) startGame();
  var dh = parseInt(Q.get("h") || "0", 10);
  if (dh > 0) {
    if (G.state === "TITLE") startGame();
    debugJumpTo(dh);
  }
  requestAnimationFrame(frame);
})();

</script>
