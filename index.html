<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#f2ead6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Spidey Jump</title>
  </head>
  <body>
    <main id="app" aria-label="Spidey Jump game">
      <div id="game-shell"></div>
      <div id="game-controls" aria-label="Game controls">
        <button id="tilt-button" class="comic-button tilt" type="button">ENABLE TILT</button>
        <button id="pause-button" class="icon-button" type="button" aria-label="Pause game">Ⅱ</button>
      </div>
      <section id="resume-overlay" class="screen-overlay" aria-live="polite" hidden>
        <div class="paper-panel">
          <strong>PAUSED</strong>
          <button id="resume-button" class="comic-button" type="button">TAP TO RESUME</button>
        </div>
      </section>
      <section id="rotate-overlay" class="screen-overlay rotate" aria-live="polite">
        <div class="paper-panel">
          <strong>TURN THE PHONE</strong>
          <span>Spidey climbs best in portrait.</span>
        </div>
      </section>
      <div id="fatal" role="alert" hidden></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
